services:
  - type: web
    name: jeeves-api
    env: docker
    region: frankfurt
    plan: free
    buildCommand: ""
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CHROMA_PATH
        value: /opt/data/chroma
      - key: KNOWLEDGE_DIR
        value: /opt/data/knowledge
      - key: PUBLIC_BASE_URL
        fromService:
          name: jeeves-api
          type: web
          envVarKey: RENDER_EXTERNAL_URL
