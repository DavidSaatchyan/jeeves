{% extends "base.html" %}
{% block body %}
<h1>Customers</h1>
<p class="page-desc">Every customer has a story. Search, view context, and handle conversations.</p>

<div class="customers-layout">
  <!-- Left: List -->
  <div class="card customers-list-panel">
    <div class="card-header" style="flex-wrap:wrap;gap:6px">
      <input type="text" id="customerSearch" placeholder="Search name or email..." style="flex:1;min-width:140px" oninput="debounceSearch()">
      <select id="riskFilter" onchange="loadCustomers()" style="width:auto">
        <option value="">All</option>
        <option value="high">High risk</option>
        <option value="medium">Medium</option>
        <option value="low">Low</option>
      </select>
    </div>
    <div id="customerList" class="muted" style="font-size:13px">Loading...</div>
    <div id="customerPagination" class="flex" style="justify-content:center;padding:8px;gap:6px"></div>
  </div>

  <!-- Right: Detail + Conversation -->
  <div class="customers-detail-panel" id="detailPanel" style="display:none">
    <div class="card" style="margin-bottom:8px">
      <div class="flex" style="justify-content:space-between;align-items:center;margin-bottom:8px">
        <h2 id="detailName" style="margin:0;font-size:16px">Customer</h2>
        <span class="pill" id="detailRisk" style="font-size:9px">—</span>
      </div>
      <div id="detailProfile" style="font-size:12px;line-height:1.8">
        <div class="flex" style="justify-content:space-between"><span class="muted2">Email</span><span id="detailEmail">—</span></div>
        <div class="flex" style="justify-content:space-between"><span class="muted2">Workflows</span><span id="detailWorkflows">0</span></div>
        <div class="flex" style="justify-content:space-between"><span class="muted2">Escalations</span><span id="detailEscalations">0</span></div>
      </div>
      <div id="detailContext" style="margin-top:8px;padding:8px;background:rgba(255,255,255,0.03);border-radius:6px;font-size:12px;display:none"></div>
    </div>

    <!-- Conversation thread -->
    <div class="card" id="threadPanel" style="display:none">
      <div class="flex" style="justify-content:space-between;align-items:center;margin-bottom:8px">
        <h3 style="margin:0;font-size:13px">Conversation</h3>
        <div class="flex gap-sm">
          <button class="btn ghost sm" onclick="takeoverConversation()">Take over</button>
          <button class="btn ghost sm" onclick="suggestResponse()">AI suggest</button>
        </div>
      </div>
      <div id="threadBody" style="max-height:300px;overflow-y:auto;font-size:13px"></div>
      <div id="suggestArea" style="display:none;margin-top:8px;padding:8px;background:rgba(129,140,248,0.06);border-radius:6px;font-size:12px">
        <div id="suggestText" class="muted" style="margin-bottom:6px"></div>
        <button class="btn sm" onclick="acceptSuggestion()">Use</button>
        <button class="ghost sm" onclick="dismissSuggestion()">Dismiss</button>
      </div>
    </div>

    <div class="muted" id="detailEmpty" style="text-align:center;padding:40px">Select a customer to view details and conversations.</div>
  </div>
</div>

<script>
var customerPage = 0;
var customerSearchTimer;
var currentCustId = null;
var currentSessionId = null;
var currentSuggestion = '';

function debounceSearch() {
  clearTimeout(customerSearchTimer);
  customerSearchTimer = setTimeout(loadCustomers, 300);
}

async function loadCustomers() {
  var q = document.getElementById('customerSearch').value;
  var risk = document.getElementById('riskFilter').value;
  var params = '?skip=' + (customerPage * 20) + '&limit=20';
  if (q) params += '&q=' + encodeURIComponent(q);
  if (risk) params += '&risk_level=' + risk;

  try {
    var data = await api('/admin/api/customers' + params);
    var customers = data.customers || [];
    var total = data.total || 0;

    document.getElementById('customerList').innerHTML = customers.length
      ? customers.map(function(c){
          var r = c.risk_level || '';
          var icon = r === 'high' ? '🔴' : r === 'medium' ? '🟡' : '🟢';
          var activeWf = c.total_workflows || 0;
          return '<div class="tl-row customer-item" data-id="' + c.id + '" onclick="openCustomer(\'' + c.id + '\')" style="cursor:pointer">' +
            '<span>' + icon + '</span>' +
            '<div style="flex:1;min-width:0">' +
            '<div style="font-weight:600;font-size:13px">' + esc(c.name || c.email || '—') + '</div>' +
            '<div class="muted" style="font-size:11px">' + (activeWf ? activeWf + ' active' : 'no activity') + ' · ' + esc(c.email || '') + '</div>' +
            '</div>' +
            '</div>';
        }).join('')
      : '<div class="muted" style="text-align:center;padding:24px">No customers found.</div>';

    var pages = Math.ceil(total / 20);
    var pag = document.getElementById('customerPagination');
    if (pages > 1) {
      pag.innerHTML = (customerPage > 0 ? '<button class="ghost sm" onclick="customerPage--;loadCustomers()">←</button>' : '') +
        '<span class="muted" style="font-size:11px">' + (customerPage + 1) + ' / ' + pages + '</span>' +
        (customerPage < pages - 1 ? '<button class="ghost sm" onclick="customerPage++;loadCustomers()">→</button>' : '');
    } else { pag.innerHTML = ''; }
  } catch(e) { console.error('customers error:', e); }
}

async function openCustomer(id) {
  currentCustId = id;
  document.getElementById('detailPanel').style.display = '';
  document.getElementById('detailEmpty').style.display = 'none';
  document.getElementById('threadPanel').style.display = 'none';
  document.getElementById('detailContext').style.display = 'none';
  document.getElementById('detailName').textContent = 'Loading...';

  try {
    var [d, ctx] = await Promise.allSettled([
      api('/admin/api/customers/' + id),
      api('/admin/api/customers/' + id + '/context'),
    ]);
    var customer = d.value || {};
    var context = ctx.value || {};

    document.getElementById('detailName').textContent = customer.name || 'Customer';
    var r = customer.risk_level || 'unknown';
    document.getElementById('detailRisk').textContent = r;
    document.getElementById('detailRisk').className = 'pill ' + (r === 'high' ? 'err' : r === 'medium' ? 'warn' : 'muted');
    document.getElementById('detailEmail').textContent = customer.email || '—';
    document.getElementById('detailWorkflows').textContent = customer.total_workflows || 0;
    document.getElementById('detailEscalations').textContent = customer.total_escalations || 0;

    var ctxHtml = '';
    if (context.summary) ctxHtml += '<div style="margin-bottom:6px">' + esc(context.summary) + '</div>';
    if (context.churn_risk != null) ctxHtml += '<div class="flex" style="justify-content:space-between"><span class="muted2">Churn risk</span><span>' + Math.round(context.churn_risk * 100) + '%</span></div>';
    if (ctxHtml) {
      document.getElementById('detailContext').innerHTML = ctxHtml;
      document.getElementById('detailContext').style.display = '';
    }

    // Check for active conversation
    var inbox = await api('/admin/api/inbox?limit=5');
    var convs = inbox.conversations || [];
    var match = convs.find(function(c){ return c.user_id === customer.email || c.user_id === id; });
    if (match) {
      currentSessionId = match.session_id;
      await loadThread(match.session_id);
    }
  } catch(e) { console.error('customer detail error:', e); }
}

async function loadThread(sessionId) {
  try {
    var data = await api('/admin/api/inbox/' + sessionId);
    var messages = data.messages || [];
    document.getElementById('threadPanel').style.display = '';
    document.getElementById('threadBody').innerHTML = messages.length
      ? messages.map(function(m){
          var isAi = m.direction === 'received';
          return '<div style="margin-bottom:8px;padding:8px 10px;background:' + (isAi ? 'rgba(129,140,248,0.06)' : 'rgba(255,255,255,0.03)') + ';border-radius:6px">' +
            '<div style="font-size:10px;font-weight:700;color:var(--accent);margin-bottom:2px">' + (isAi ? 'AI' : 'Customer') + '</div>' +
            '<div style="line-height:1.5">' + esc(m.message || m.response || '') + '</div>' +
            '<div class="muted2" style="font-size:10px;margin-top:2px">' + (m.created_at ? m.created_at.slice(11, 19) : '') + '</div>' +
            '</div>';
        }).join('')
      : '<div class="muted" style="text-align:center;padding:16px">No messages.</div>';
  } catch(e) { console.error('thread load error:', e); }
}

async function takeoverConversation() {
  if (!currentSessionId) return;
  try {
    await api('/admin/api/inbox/' + currentSessionId + '/takeover', { method: 'POST' });
    alert('Taken over.');
  } catch(e) { alert('Error: ' + e.message); }
}

async function suggestResponse() {
  if (!currentSessionId) return;
  try {
    var data = await api('/admin/api/inbox/' + currentSessionId + '/suggest', { method: 'POST' });
    currentSuggestion = data.suggestion || '';
    document.getElementById('suggestText').textContent = currentSuggestion;
    document.getElementById('suggestArea').style.display = '';
  } catch(e) { alert('Error: ' + e.message); }
}

function acceptSuggestion() { document.getElementById('suggestArea').style.display = 'none'; alert('Suggestion ready. Copy from the area.'); }
function dismissSuggestion() { document.getElementById('suggestArea').style.display = 'none'; }

loadCustomers();
</script>

<style>
.customers-layout { display:grid; grid-template-columns:320px 1fr; gap:12px; align-items:start; }
.customers-list-panel { max-height:80vh; overflow-y:auto; }
.customer-item { padding:8px 10px; border-radius:6px; }
.customer-item:hover { background:rgba(129,140,248,0.05); }
.customers-detail-panel { min-height:300px; }
</style>
{% endblock %}
