{% extends "base.html" %}
{% block body %}
<h1>Appointments</h1>
<p class="page-desc">Manage patient appointments, view calendar, and track visit status.</p>

<div class="stats" id="apptStats"></div>

<div class="flex flex-wrap gap-sm mb-16">
  <button onclick="showCreateModal()" class="accent">+ New Appointment</button>
  <div class="flex gap-sm" style="margin-left:auto">
    <div class="flex gap-sm" style="background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:2px">
      <button class="ghost sm cal-toggle active" data-view="day" onclick="setView('day')" style="font-size:11px;padding:5px 10px">Day</button>
      <button class="ghost sm cal-toggle" data-view="week" onclick="setView('week')" style="font-size:11px;padding:5px 10px">Week</button>
      <button class="ghost sm cal-toggle" data-view="month" onclick="setView('month')" style="font-size:11px;padding:5px 10px">Month</button>
    </div>
    <button class="ghost sm" onclick="navDate(-1)" style="font-size:14px;padding:5px 8px">&larr;</button>
    <span id="calRange" class="muted" style="font-size:12px;font-weight:600;min-width:160px;text-align:center;display:inline-block"></span>
    <button class="ghost sm" onclick="navDate(1)" style="font-size:14px;padding:5px 8px">&rarr;</button>
    <button class="ghost sm" onclick="todayDate()" style="font-size:11px;padding:5px 10px">Today</button>
    <input id="apptDate" type="date" onchange="onDatePick()" style="width:140px;padding:6px 10px;font-size:12px"/>
    <select id="apptStatusFilter" onchange="loadAppointments()" style="width:auto;padding:6px 10px;font-size:12px">
      <option value="">All statuses</option>
      <option value="scheduled">Scheduled</option>
      <option value="confirmed">Confirmed</option>
      <option value="arrived">Arrived</option>
      <option value="in_progress">In Progress</option>
      <option value="completed">Completed</option>
      <option value="cancelled">Cancelled</option>
      <option value="no_show">No Show</option>
      <option value="rescheduled">Rescheduled</option>
    </select>
    <select id="apptProviderFilter" onchange="loadAppointments()" style="width:auto;padding:6px 10px;font-size:12px">
      <option value="">All providers</option>
    </select>
  </div>
</div>

<!-- Calendar grid for week/month view -->
<div id="calGrid" style="display:none"></div>

<div class="card" style="padding:0;overflow:auto">
  <table class="appt-table">
    <thead>
      <tr>
        <th>Time</th>
        <th>Patient</th>
        <th>Provider</th>
        <th>Reason</th>
        <th>Department</th>
        <th>Status</th>
        <th>Source</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="apptTbody">
      <tr><td colspan="8" class="muted" style="text-align:center;padding:32px">Loading...</td></tr>
    </tbody>
  </table>
</div>

<div class="flex flex-wrap gap-sm mt-16" id="apptPagination"></div>

<!-- Create Modal -->
<div class="modal-overlay" id="createModal">
  <div class="modal" style="max-width:520px">
    <div class="modal-header">
      <h2>New Appointment</h2>
      <button class="ghost sm" onclick="closeModal('createModal')" style="border:none;font-size:18px;padding:4px 8px">&times;</button>
    </div>
    <label>Patient ID</label>
    <input id="newPatientId" type="text" placeholder="UUID from patients table"/>
    <label>Provider</label>
    <select id="newProvider"></select>
    <label>Date &amp; Time</label>
    <input id="newStart" type="datetime-local" style="margin-bottom:8px"/>
    <label>End Time</label>
    <input id="newEnd" type="datetime-local"/>
    <label>Reason</label>
    <input id="newReason" type="text" placeholder="Reason for visit"/>
    <div class="flex gap-sm mt-16" style="justify-content:flex-end">
      <button class="ghost sm" onclick="closeModal('createModal')">Cancel</button>
      <button class="accent sm" onclick="createAppointment()">Create</button>
    </div>
    <div id="createMsg" class="err-msg mt-12"></div>
  </div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="detailModal">
  <div class="modal" style="max-width:520px">
    <div class="modal-header">
      <h2 id="detailTitle">Appointment</h2>
      <button class="ghost sm" onclick="closeModal('detailModal')" style="border:none;font-size:18px;padding:4px 8px">&times;</button>
    </div>
    <div id="detailBody"></div>
    <div class="flex flex-wrap gap-sm mt-16" id="detailActions"></div>
    <div id="detailMsg" class="err-msg mt-12"></div>
  </div>
</div>
{% endblock %}

{% block tail %}
<style>
.appt-table { width:100%; border-collapse:collapse; font-size:13px; }
.appt-table th { padding:10px 14px; text-align:left; font-weight:600; color:var(--muted2); font-size:10px; text-transform:uppercase; letter-spacing:.5px; border-bottom:1px solid var(--border); background:var(--surface); position:sticky; top:0; }
.appt-table td { padding:12px 14px; border-bottom:1px solid var(--border); vertical-align:middle; }
.appt-table tr:last-child td { border-bottom:none; }
.appt-table tr:hover td { background:rgba(255,255,255,0.03); }
.appt-time { font-family:'SF Mono',ui-monospace,Consolas,monospace; font-size:12px; font-weight:600; white-space:nowrap; }
.cal-toggle.active { background:var(--accent)!important; color:#fff!important; border-color:var(--accent)!important; }
.cal-week-header { display:grid; grid-template-columns:repeat(7,1fr); border-bottom:1px solid var(--border); }
.cal-week-header .cal-week-cell { padding:12px 8px; text-align:center; border-right:1px solid var(--border); }
.cal-week-header .cal-week-cell:last-child { border-right:none; }
.cal-week-body { display:grid; grid-template-columns:repeat(7,1fr); min-height:200px; }
.cal-week-body .cal-week-cell { padding:8px; border-right:1px solid var(--border); min-height:120px; }
.cal-week-body .cal-week-cell:last-child { border-right:none; }
.cal-day-name { font-size:10px; text-transform:uppercase; color:var(--muted2); letter-spacing:.5px; font-weight:600; }
.cal-day-num { font-size:18px; font-weight:700; margin-top:2px; }
.cal-appt-dot { width:6px; height:6px; border-radius:50%; display:inline-block; margin-right:4px; flex-shrink:0; }
.cal-appt-label { font-size:10px; color:var(--muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; display:flex; align-items:center; gap:3px; margin-bottom:2px; }
.cal-more { font-size:9px; color:var(--muted2); font-weight:600; margin-top:2px; }
.cal-month-grid { display:grid; grid-template-columns:repeat(7,1fr); }
.cal-month-header { padding:10px 6px; text-align:center; font-size:10px; font-weight:700; text-transform:uppercase; color:var(--muted2); letter-spacing:.5px; border-bottom:1px solid var(--border); }
.cal-month-cell { min-height:80px; border-right:1px solid var(--border); border-bottom:1px solid var(--border); padding:4px; }
.cal-month-cell:nth-child(7n) { border-right:none; }
.cal-month-cell.cal-empty { background:rgba(255,255,255,0.01); }
.cal-month-cell.cal-today { background:rgba(94,106,210,0.06); }
.cal-month-day { font-size:13px; font-weight:700; color:var(--muted); margin-bottom:2px; padding:2px; }
.cal-month-appt { font-size:9px; padding:1px 4px; margin-bottom:1px; border-radius:2px; display:flex; gap:3px; background:rgba(255,255,255,0.03); }
.cal-appt-time { font-family:'SF Mono',ui-monospace,Consolas,monospace; font-weight:600; color:var(--text); }
</style>
<script>
function esc(v){ return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&gt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// ── Calendar view state ──
var calView = 'day';
var calAnchor = new Date();

function fmtDate(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }

function getDateRange() {
  var d = new Date(calAnchor);
  if (calView === 'day') {
    return { from: fmtDate(d), to: fmtDate(d), label: d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'}) };
  }
  if (calView === 'week') {
    var day = d.getDay(); var diff = d.getDate() - day + (day===0?-6:1);
    var mon = new Date(d); mon.setDate(diff);
    var sun = new Date(mon); sun.setDate(mon.getDate()+6);
    return { from: fmtDate(mon), to: fmtDate(sun), label: fmtDate(mon)+' — '+fmtDate(sun) };
  }
  // month
  var first = new Date(d.getFullYear(), d.getMonth(), 1);
  var last = new Date(d.getFullYear(), d.getMonth()+1, 0);
  return { from: fmtDate(first), to: fmtDate(last), label: d.toLocaleDateString('en-US',{month:'long',year:'numeric'}) };
}

function setView(v) {
  calView = v;
  document.querySelectorAll('.cal-toggle').forEach(function(b){ b.classList.toggle('active', b.dataset.view===v); });
  loadAppointments();
}

function navDate(dir) {
  if (calView === 'day') { calAnchor.setDate(calAnchor.getDate()+dir); }
  else if (calView === 'week') { calAnchor.setDate(calAnchor.getDate()+dir*7); }
  else { calAnchor.setMonth(calAnchor.getMonth()+dir); }
  document.getElementById('apptDate').value = fmtDate(calAnchor);
  loadAppointments();
}

function todayDate() {
  calAnchor = new Date();
  document.getElementById('apptDate').value = fmtDate(calAnchor);
  loadAppointments();
}

function onDatePick() {
  var v = document.getElementById('apptDate').value;
  if (v) { calAnchor = new Date(v+'T12:00:00'); }
  loadAppointments();
}

// ── Init date ──
document.getElementById('apptDate').valueAsDate = new Date();

// ── Load providers for filter and create modal ──
var providers = [];
async function loadProviders() {
  try {
    var d = await api('/admin/api/providers');
    providers = d.providers || [];
    var selects = ['apptProviderFilter', 'newProvider'];
    selects.forEach(function(sid){
      var el = document.getElementById(sid);
      if (!el) return;
      var currentVal = el.value;
      if (sid === 'newProvider') {
        el.innerHTML = providers.map(function(p){ return '<option value="'+esc(p.name)+'">'+esc(p.name)+(p.specialty ? ' ('+esc(p.specialty)+')' : '')+'</option>'; }).join('');
      } else {
        el.innerHTML = '<option value="">All providers</option>' +
          providers.map(function(p){ return '<option value="'+esc(p.name)+'">'+esc(p.name)+'</option>'; }).join('');
        if (currentVal) el.value = currentVal;
      }
    });
  } catch(e) { console.error('providers error:', e); }
}

// ── Load appointments ──
var allAppointments = [];

async function loadAppointments(page) {
  page = page || 0;
  var range = getDateRange();
  document.getElementById('calRange').textContent = range.label;
  var status = document.getElementById('apptStatusFilter').value;
  var provider = document.getElementById('apptProviderFilter').value;
  var limit = 200;
  var offset = 0;
  var params = '?limit='+limit+'&offset='+offset;
  params += '&date_from='+range.from+'T00:00:00&date_to='+range.to+'T23:59:59';
  if (status) params += '&status='+status;
  if (provider) params += '&provider='+encodeURIComponent(provider);

  try {
    var d = await api('/admin/api/appointments'+params);
    allAppointments = d.appointments || [];
    if (calView === 'day') {
      document.getElementById('calGrid').style.display = 'none';
      renderAppointments(d, page);
    } else {
      renderCalendarGrid(d);
    }
  } catch(e) {
    document.getElementById('apptTbody').innerHTML = '<tr><td colspan="8" class="err-msg" style="text-align:center;padding:32px">Error: '+esc(e.message)+'</td></tr>';
  }
}

function statusColor(s) {
  if (s === 'confirmed' || s === 'arrived') return 'var(--green)';
  if (s === 'completed') return 'var(--cyan)';
  if (s === 'cancelled' || s === 'no_show') return 'var(--red)';
  if (s === 'rescheduled') return 'var(--amber)';
  if (s === 'in_progress') return 'var(--accent)';
  return 'var(--muted2)';
}

// ── Calendar grid for week/month views ──
function renderCalendarGrid(d) {
  var rows = d.appointments || [];
  var range = getDateRange();
  var from = new Date(range.from+'T00:00:00');
  var to = new Date(range.to+'T23:59:59');
  var days = [];
  for (var dt = new Date(from); dt <= to; dt.setDate(dt.getDate()+1)) {
    days.push(new Date(dt));
  }

  // Group appointments by date
  var byDate = {};
  rows.forEach(function(a){
    var dk = (a.start_time||'').slice(0,10);
    if (!byDate[dk]) byDate[dk] = [];
    byDate[dk].push(a);
  });

  var total = d.total || rows.length;
  var html = '<div class="card" style="padding:0;overflow:auto;margin-bottom:16px">';

  if (calView === 'week') {
    // Week view: 7 columns
    html += '<div class="cal-week-header">';
    days.forEach(function(dd){
      html += '<div class="cal-week-cell"><div class="cal-day-name">'+dd.toLocaleDateString('en-US',{weekday:'short'})+'</div><div class="cal-day-num">'+dd.getDate()+'</div></div>';
    });
    html += '</div><div class="cal-week-body">';
    days.forEach(function(dd){
      var dk = fmtDate(dd);
      var dayAppts = byDate[dk] || [];
      html += '<div class="cal-week-cell">';
      dayAppts.slice(0,4).forEach(function(a){
        var t = (a.start_time||'').slice(11,16);
        html += '<div class="cal-appt-dot" style="background:'+statusColor(a.status)+'" title="'+esc(t)+' '+esc(a.reason||'')+'"></div>';
        html += '<div class="cal-appt-label">'+esc(t)+' '+esc(a.patient_id.slice(0,6))+'</div>';
      });
      if (dayAppts.length > 4) html += '<div class="cal-more">+'+(dayAppts.length-4)+' more</div>';
      html += '</div>';
    });
    html += '</div>';
  } else {
    // Month view: calendar grid
    var firstDay = new Date(from);
    var startPad = firstDay.getDay(); // 0=Sun
    html += '<div class="cal-month-grid">';
    ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(function(dn){ html += '<div class="cal-month-header">'+dn+'</div>'; });
    // padding cells
    for (var p = 0; p < startPad; p++) { html += '<div class="cal-month-cell cal-empty"></div>'; }
    days.forEach(function(dd){
      var dk = fmtDate(dd);
      var dayAppts = byDate[dk] || [];
      var isToday = fmtDate(new Date()) === dk;
      html += '<div class="cal-month-cell'+(isToday?' cal-today':'')+'">';
      html += '<div class="cal-month-day">'+dd.getDate()+'</div>';
      dayAppts.slice(0,3).forEach(function(a){
        html += '<div class="cal-month-appt" style="border-left:2px solid '+statusColor(a.status)+'">'+
          '<span class="cal-appt-time">'+(a.start_time||'').slice(11,16)+'</span>'+
          '<span class="cal-appt-patient">'+esc(a.patient_id.slice(0,6))+'</span>'+
        '</div>';
      });
      if (dayAppts.length > 3) html += '<div class="cal-more">+'+(dayAppts.length-3)+'</div>';
      html += '</div>';
    });
    html += '</div>';
  }

  html += '</div>';

  // Stats
  var byStatus = {};
  rows.forEach(function(a){ byStatus[a.status] = (byStatus[a.status]||0)+1; });
  document.getElementById('apptStats').innerHTML =
    '<div class="stat"><div class="n">'+total+'</div><div class="l">Total appointments</div></div>' +
    '<div class="stat"><div class="n">'+(byStatus['confirmed']||0)+(byStatus['arrived']? ' +'+(byStatus['arrived']||0):'')+'</div><div class="l">Confirmed'+(byStatus['arrived']?' / Arrived':'')+'</div></div>' +
    '<div class="stat"><div class="n">'+(byStatus['completed']||0)+'</div><div class="l">Completed</div></div>' +
    '<div class="stat"><div class="n">'+(byStatus['no_show']||0)+(byStatus['cancelled']? ' / '+(byStatus['cancelled']||0):'')+'</div><div class="l">No Show'+(byStatus['cancelled']?' / Cancelled':'')+'</div></div>';

  // Detail table below
  document.getElementById('calGrid').innerHTML = html;
  document.getElementById('calGrid').style.display = '';
  // Still render table for full details
  renderAppointments(d, 0);
}

function statusPill(s) {
  var cls = 'muted';
  if (s === 'confirmed' || s === 'arrived') cls = 'ok';
  else if (s === 'completed') cls = 'cyan';
  else if (s === 'cancelled' || s === 'no_show') cls = 'err';
  else if (s === 'rescheduled') cls = 'warn';
  else if (s === 'in_progress') cls = 'accent';
  return '<span class="pill '+cls+'" style="font-size:10px">'+s.replace(/_/g,' ')+'</span>';
}

function renderAppointments(d, page) {
  var rows = d.appointments || [];
  document.getElementById('apptTbody').innerHTML = rows.length
    ? rows.map(function(a){
        var time = a.start_time ? a.start_time.slice(11, 16) : '&mdash;';
        var endTime = a.end_time ? a.end_time.slice(11, 16) : '';
        return '<tr>' +
          '<td class="appt-time">'+esc(time)+'</td>' +
          '<td><a href="#" onclick="event.preventDefault();showDetail(\''+a.id+'\')" style="font-weight:600;border:none">'+esc(a.patient_id.slice(0,8))+'&hellip;</a></td>' +
          '<td>'+esc(a.provider_name||'&mdash;')+'</td>' +
          '<td style="color:var(--muted)">'+esc(a.reason||'&mdash;')+'</td>' +
          '<td style="color:var(--muted2);font-size:12px">'+esc(a.department||'&mdash;')+'</td>' +
          '<td>'+statusPill(a.status)+'</td>' +
          '<td style="color:var(--muted2);font-size:12px">'+esc(a.source)+'</td>' +
          '<td><button class="ghost sm" onclick="showDetail(\''+a.id+'\')" style="font-size:11px">View</button></td>' +
        '</tr>';
      }).join('')
    : '<tr><td colspan="8" class="muted" style="text-align:center;padding:32px">No appointments found for this date.</td></tr>';

  // Stats
  var total = d.total || 0;
  var byStatus = {};
  rows.forEach(function(a){ byStatus[a.status] = (byStatus[a.status]||0)+1; });
  document.getElementById('apptStats').innerHTML =
    '<div class="stat"><div class="n">'+total+'</div><div class="l">Total appointments</div></div>' +
    '<div class="stat"><div class="n">'+(byStatus['confirmed']||0)+(byStatus['arrived']? ' +'+(byStatus['arrived']||0):'')+'</div><div class="l">Confirmed'+(byStatus['arrived']?' / Arrived':'')+'</div></div>' +
    '<div class="stat"><div class="n">'+(byStatus['completed']||0)+'</div><div class="l">Completed</div></div>' +
    '<div class="stat"><div class="n">'+(byStatus['no_show']||0)+(byStatus['cancelled']? ' / '+(byStatus['cancelled']||0):'')+'</div><div class="l">No Show'+(byStatus['cancelled']?' / Cancelled':'')+'</div></div>';

  // Pagination
  var pages = Math.ceil(total / 50);
  if (pages > 1) {
    var ph = '';
    for (var i = 0; i < pages; i++) {
      ph += '<button class="ghost sm '+(i===page?'accent':'')+'" onclick="loadAppointments('+i+')">'+(i+1)+'</button>';
    }
    document.getElementById('apptPagination').innerHTML = ph;
  } else {
    document.getElementById('apptPagination').innerHTML = '';
  }
}

// ── Create appointment ──
function showCreateModal() {
  document.getElementById('createModal').classList.add('show');
  document.getElementById('createMsg').textContent = '';
  // Set default times
  var now = new Date();
  var start = new Date(now.getTime() + 3600000); // +1 hour
  document.getElementById('newStart').value = start.toISOString().slice(0,16);
  var end = new Date(start.getTime() + 1800000); // +30 min
  document.getElementById('newEnd').value = end.toISOString().slice(0,16);
}

function closeModal(id) {
  document.getElementById(id).classList.remove('show');
}

async function createAppointment() {
  var body = {
    patient_id: document.getElementById('newPatientId').value.trim(),
    provider_name: document.getElementById('newProvider').value,
    start_time: document.getElementById('newStart').value,
    end_time: document.getElementById('newEnd').value,
    reason: document.getElementById('newReason').value.trim(),
    source: 'admin',
  };
  if (!body.patient_id || !body.start_time || !body.end_time) {
    document.getElementById('createMsg').textContent = 'Patient ID, start and end time required';
    return;
  }
  try {
    await api('/admin/api/appointments', {method: 'POST', body: body});
    closeModal('createModal');
    loadAppointments();
    loadProviders();
  } catch(e) {
    document.getElementById('createMsg').textContent = e.message;
  }
}

// ── Detail view ──
async function showDetail(id) {
  try {
    var a = await api('/admin/api/appointments/'+id);
    var h = '<div style="display:grid;gap:12px">';
    h += '<div class="flex" style="justify-content:space-between"><span class="muted2">Patient</span><span style="font-weight:600">'+esc(a.patient_id)+'</span></div>';
    h += '<div class="flex" style="justify-content:space-between"><span class="muted2">Provider</span><span>'+esc(a.provider_name||'&mdash;')+'</span></div>';
    h += '<div class="flex" style="justify-content:space-between"><span class="muted2">Department</span><span>'+esc(a.department||'&mdash;')+'</span></div>';
    h += '<div class="flex" style="justify-content:space-between"><span class="muted2">Date &amp; Time</span><span>'+esc((a.start_time||'').slice(0,16).replace('T',' '))+'</span></div>';
    h += '<div class="flex" style="justify-content:space-between"><span class="muted2">Duration</span><span>'+(a.end_time && a.start_time ? Math.round((new Date(a.end_time)-new Date(a.start_time))/60000)+' min' : '&mdash;')+'</span></div>';
    h += '<div class="flex" style="justify-content:space-between"><span class="muted2">Status</span><span>'+statusPill(a.status)+'</span></div>';
    h += '<div class="flex" style="justify-content:space-between"><span class="muted2">Reason</span><span style="color:var(--muted)">'+esc(a.reason||'&mdash;')+'</span></div>';
    h += '<div class="flex" style="justify-content:space-between"><span class="muted2">Source</span><span style="color:var(--muted2)">'+esc(a.source)+'</span></div>';
    if (a.notes) h += '<div class="flex" style="justify-content:space-between"><span class="muted2">Notes</span><span style="color:var(--muted)">'+esc(a.notes)+'</span></div>';
    h += '</div>';
    document.getElementById('detailBody').innerHTML = h;

    // Actions
    var actions = '';
    if (a.status === 'scheduled') {
      actions += '<button class="green sm" onclick="updateStatus(\''+a.id+'\',\'confirmed\')">Confirm</button>';
    }
    if (a.status === 'confirmed') {
      actions += '<button class="accent sm" onclick="updateStatus(\''+a.id+'\',\'arrived\')">Mark Arrived</button>';
    }
    if (a.status === 'arrived' || a.status === 'in_progress') {
      actions += '<button class="cyan sm" onclick="updateStatus(\''+a.id+'\',\'completed\')">Complete</button>';
    }
    if (a.status !== 'completed' && a.status !== 'cancelled' && a.status !== 'no_show') {
      actions += '<button class="ghost sm danger" onclick="updateStatus(\''+a.id+'\',\'cancelled\')">Cancel</button>';
      actions += '<button class="ghost sm warn" onclick="updateStatus(\''+a.id+'\',\'no_show\')">No Show</button>';
    }
    if (a.status !== 'cancelled' && a.status !== 'completed') {
      actions += '<button class="ghost sm" onclick="updateStatus(\''+a.id+'\',\'rescheduled\')">Reschedule</button>';
    }
    document.getElementById('detailActions').innerHTML = actions;
    document.getElementById('detailMsg').textContent = '';
    document.getElementById('detailModal').classList.add('show');
  } catch(e) {
    document.getElementById('detailMsg').textContent = 'Error: '+e.message;
  }
}

async function updateStatus(id, status) {
  try {
    await api('/admin/api/appointments/'+id, {method: 'PATCH', body: {status: status}});
    closeModal('detailModal');
    loadAppointments();
  } catch(e) {
    document.getElementById('detailMsg').textContent = e.message;
  }
}

// ── Init ──
loadProviders();
document.getElementById('calRange').textContent = getDateRange().label;
loadAppointments();
</script>
{% endblock %}
