{% extends "base.html" %}
{% block body %}
<h1>Account</h1>
<p class="page-desc">Your workspace details, API keys, and subscription information.</p>

<div class="card" style="margin-bottom:12px">
  <h2>Workspace</h2>
  <div id="workspaceInfo" style="font-size:13px">Loading...</div>
</div>

<div class="card" style="margin-bottom:12px">
  <div class="card-header">
    <h2>API keys</h2>
    <button class="btn ghost sm" onclick="showKeyForm()">+ New</button>
  </div>
  <div id="apiKeysList" style="font-size:13px">Loading...</div>
  <div id="keyForm" style="display:none;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)">
    <input type="text" id="newKeyName" placeholder="Key name (e.g. Production)" style="width:100%;margin-bottom:8px">
    <div class="flex gap-sm">
      <button class="btn sm" onclick="createKey()">Create</button>
      <button class="ghost sm" onclick="hideKeyForm()">Cancel</button>
    </div>
  </div>
  <div id="keyReveal" style="display:none;margin-top:12px;padding:12px;background:rgba(245,158,11,0.08);border-radius:6px">
    <div class="muted" style="font-size:11px;margin-bottom:4px">Copy this key now — it won't be shown again.</div>
    <div id="rawKey" style="font-family:monospace;font-size:12px;word-break:break-all;margin-bottom:8px"></div>
    <button class="btn sm" onclick="navigator.clipboard.writeText(rawKeyValue);alert('Copied!')">Copy</button>
    <button class="ghost sm" onclick="hideReveal()">Done</button>
  </div>
</div>

<div class="card">
  <h2>Subscription</h2>
  <div id="billingInfo" style="font-size:13px">Loading...</div>
</div>

<script>
var rawKeyValue = '';

async function loadAccount() {
  try {
    var s = await api('/admin/api/settings');
    var settings = s || {};
    var bill = settings.billing || {};
    var ws = settings.workspace || {};

    document.getElementById('workspaceInfo').innerHTML =
      '<div class="flex" style="justify-content:space-between;margin-bottom:6px"><span class="muted2">Organization</span><span style="font-weight:600">' + esc(ws.name || '—') + '</span></div>' +
      '<div class="flex" style="justify-content:space-between;margin-bottom:6px"><span class="muted2">Email</span><span>' + esc(ws.email || '—') + '</span></div>' +
      '<div class="flex" style="justify-content:space-between"><span class="muted2">Plan</span><span class="pill muted" style="text-transform:capitalize;font-size:10px">' + esc(ws.plan || 'free') + '</span></div>';

    var keys = settings.api_keys || [];
    document.getElementById('apiKeysList').innerHTML = keys.length
      ? keys.map(function(k){
          return '<div class="tl-row"><span style="flex:1;font-size:12px"><strong>' + esc(k.name) + '</strong> <span class="muted2" style="font-size:11px;font-family:monospace">' + esc(k.prefix) + '...</span></span><span class="muted2" style="font-size:10px">' + (k.last_used_at ? k.last_used_at.slice(0,10) : 'Never') + '</span><button class="ghost sm" style="color:var(--red)" onclick="revokeKey(\'' + k.id + '\')">Revoke</button></div>';
        }).join('')
      : '<div class="muted">No API keys.</div>';

    document.getElementById('billingInfo').innerHTML =
      '<div class="flex" style="justify-content:space-between;margin-bottom:6px"><span class="muted2">Resolved this period</span><span style="font-weight:600">' + (bill.resolved || 0) + '</span></div>' +
      '<div class="flex" style="justify-content:space-between;margin-bottom:6px"><span class="muted2">Plan limit</span><span style="font-weight:600">' + (bill.dialogs_limit || 0) + '</span></div>' +
      '<div class="flex" style="justify-content:space-between"><span class="muted2">Overage</span><span style="font-weight:600">' + (bill.overage_charge_usd ? '$' + bill.overage_charge_usd.toFixed(2) : '$0') + '</span></div>';
  } catch(e) { console.error('account error:', e); }
}

function showKeyForm() { document.getElementById('keyForm').style.display = ''; document.getElementById('newKeyName').focus(); }
function hideKeyForm() { document.getElementById('keyForm').style.display = 'none'; }
function hideReveal() { document.getElementById('keyReveal').style.display = 'none'; rawKeyValue = ''; }

async function createKey() {
  var name = document.getElementById('newKeyName').value.trim() || 'default';
  try {
    var data = await api('/admin/api/settings/api-keys', { method: 'POST', body: { name: name } });
    rawKeyValue = data.raw_key || '';
    document.getElementById('rawKey').textContent = rawKeyValue;
    document.getElementById('keyReveal').style.display = '';
    hideKeyForm();
    loadAccount();
  } catch(e) { alert('Error: ' + e.message); }
}

async function revokeKey(id) {
  if (!confirm('Revoke this key?')) return;
  try { await api('/admin/api/settings/api-keys/' + id, { method: 'DELETE' }); loadAccount(); }
  catch(e) { alert('Error: ' + e.message); }
}

loadAccount();
</script>

<style>
.tl-row { display:flex; align-items:center; gap:8px; padding:8px 0; border-bottom:1px solid var(--border); }
.tl-row:last-child { border-bottom:none; }
.card-header { display:flex; align-items:center; justify-content:space-between; }
</style>
{% endblock %}
