{% extends "base.html" %}
{% block body %}
<h1>Escalations</h1>
<p class="page-desc">Open escalations requiring human attention.</p>

<div class="card">
  <div class="card-header">
    <h2>All escalations</h2>
    <select id="escStatusFilter" onchange="loadEscalations()" style="width:auto">
      <option value="">All statuses</option>
      <option value="OPEN">Open</option>
      <option value="ASSIGNED">Assigned</option>
      <option value="IN_PROGRESS">In Progress</option>
      <option value="RESOLVED">Resolved</option>
      <option value="CLOSED">Closed</option>
    </select>
  </div>
  <table class="table" id="escTable">
    <thead>
      <tr>
        <th>ID</th>
        <th>Workflow</th>
        <th>Reason</th>
        <th>Severity</th>
        <th>Status</th>
        <th>Assigned</th>
        <th>SLA</th>
        <th>Created</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="escBody"></tbody>
  </table>
  <div id="escPagination" class="flex" style="justify-content:center;margin-top:16px;gap:8px"></div>
</div>

<script>
var escOffset = 0;
var escTotal = 0;

async function loadEscalations() {
  const status = document.getElementById('escStatusFilter').value;
  const params = new URLSearchParams();
  if (status) params.set('status', status);
  params.set('offset', escOffset);
  params.set('limit', 50);
  const r = await fetch('/admin/api/escalations?' + params.toString());
  const data = await r.json();
  escTotal = data.total || 0;
  const tbody = document.getElementById('escBody');
  tbody.innerHTML = (data.escalations || []).map(e => {
    const sla = e.sla_breached ? 'BREACHED' : 'OK';
    return `<tr>
      <td><code>${(e.id||'').slice(0,8)}</code></td>
      <td><code>${e.workflow_id ? e.workflow_id.slice(0,8) : '-'}</code></td>
      <td>${esc(e.reason || '')}</td>
      <td><span class="pill ${e.severity === 'high' ? 'err' : e.severity === 'medium' ? 'warn' : 'muted'}">${esc(e.severity || '')}</span></td>
      <td><span class="pill ${(e.status||'').toLowerCase()}">${esc(e.status)}</span></td>
      <td>${e.assigned_to ? esc(e.assigned_to.slice(0,8)) : '-'}</td>
      <td><span class="pill ${sla === 'BREACHED' ? 'breached' : 'ok'}">${sla}</span></td>
      <td>${e.created_at ? new Date(e.created_at).toLocaleDateString() : '-'}</td>
      <td>
        <button class="ghost sm" onclick="assignEscalation('${e.id}')">Assign</button>
        <button class="ghost sm" onclick="resolveEscalation('${e.id}')">Resolve</button>
      </td>
    </tr>`;
  }).join('') || '<tr><td colspan="9" class="empty-state">No escalations found.</td></tr>';
  renderPagination();
}

function renderPagination() {
  var el = document.getElementById('escPagination');
  var totalPages = Math.ceil(escTotal / 50);
  if (totalPages <= 1) { el.innerHTML = ''; return; }
  var cur = Math.floor(escOffset / 50) + 1;
  el.innerHTML = '<button class="ghost sm" onclick="escOffset=Math.max(0,escOffset-50);loadEscalations()" ' + (escOffset <= 0 ? 'disabled' : '') + '>← Prev</button>' +
    '<span class="muted2" style="font-size:12px">Page ' + cur + ' of ' + totalPages + '</span>' +
    '<button class="ghost sm" onclick="escOffset=Math.min(escOffset+50,(totalPages-1)*50);loadEscalations()" ' + (escOffset >= (totalPages-1)*50 ? 'disabled' : '') + '>Next →</button>';
}

async function assignEscalation(id) {
  await fetch('/admin/api/escalations/' + id + '/assign', { method: 'POST' });
  loadEscalations();
}
async function resolveEscalation(id) {
  await fetch('/admin/api/escalations/' + id + '/resolve', { method: 'POST' });
  loadEscalations();
}

loadEscalations();
</script>

<style>
.pill.open { background:rgba(129,140,248,0.12); color:var(--accent); }
.pill.assigned { background:rgba(245,158,11,0.12); color:var(--amber); }
.pill.in_progress { background:rgba(16,185,129,0.12); color:var(--green); }
.pill.resolved { background:rgba(255,255,255,0.06); color:var(--muted2); }
.pill.closed { background:rgba(255,255,255,0.06); color:var(--muted2); }
.pill.breached { background:rgba(248,113,113,0.12); color:var(--red); }
.pill.ok { background:rgba(16,185,129,0.12); color:var(--green); }
</style>
{% endblock %}
