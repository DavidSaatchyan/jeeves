{% extends "base.html" %}
{% block body %}
<h1>Approvals</h1>
<p class="page-desc">Actions that require human review before execution.</p>

<div class="card">
  <div class="card-header">
    <h2>Pending approvals</h2>
    <select id="approvalFilter" onchange="loadApprovals()" style="width:auto">
      <option value="PENDING">Pending</option>
      <option value="APPROVED">Approved</option>
      <option value="REJECTED">Rejected</option>
      <option value="">All</option>
    </select>
  </div>
  <div id="approvalList" class="muted" style="padding:8px 0">Loading...</div>
  <div id="approvalPagination" class="flex" style="justify-content:center;padding:12px;gap:8px"></div>
</div>

<!-- Detail modal -->
<div id="approvalModal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeApprovalModal()">
  <div class="modal" style="max-width:560px">
    <div class="modal-header">
      <h3 id="modalTitle">Approval detail</h3>
      <button class="ghost sm" onclick="closeApprovalModal()">&times;</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-actions" id="modalActions" style="display:flex;gap:8px;justify-content:flex-end;padding:12px 20px;border-top:1px solid var(--border)"></div>
  </div>
</div>

<script>
var approvalPage = 0;

async function loadApprovals() {
  var status = document.getElementById('approvalFilter').value;
  var params = '?skip=' + (approvalPage * 20) + '&limit=20';
  if (status) params += '&status=' + status;

  try {
    var data = await api('/admin/api/approvals' + params);
    var approvals = data.approvals || [];
    var total = data.total || 0;

    document.getElementById('approvalList').innerHTML = approvals.length
      ? approvals.map(function(a){
          var riskColor = a.risk_level === 'high' ? 'err' : (a.risk_level === 'medium' ? 'warn' : 'muted');
          var statusColor = a.status === 'PENDING' ? 'warn' : (a.status === 'APPROVED' ? 'ok' : 'err');
          return '<div class="tl-row" style="cursor:pointer" onclick="openApproval(\'' + a.id + '\')">' +
            '<div style="flex:1;min-width:0">' +
            '<div style="font-weight:600;font-size:13px">' + esc(a.action_type || 'Action') + '</div>' +
            '<div class="muted" style="font-size:11px">' + esc((a.reason || '').slice(0, 60)) + '</div>' +
            '</div>' +
            '<span class="pill ' + riskColor + '" style="font-size:10px;text-transform:capitalize">' + esc(a.risk_level || 'unknown') + '</span>' +
            '<span class="pill ' + statusColor + '" style="font-size:10px">' + esc(a.status) + '</span>' +
            '</div>';
        }).join('')
      : '<div class="muted" style="text-align:center;padding:24px">No approvals found.</div>';

    var pages = Math.ceil(total / 20);
    var pag = document.getElementById('approvalPagination');
    if (pages > 1) {
      pag.innerHTML = (approvalPage > 0 ? '<button class="btn ghost sm" onclick="approvalPage--;loadApprovals()">Prev</button>' : '') +
        '<span class="muted" style="font-size:12px">' + (approvalPage + 1) + ' / ' + pages + '</span>' +
        (approvalPage < pages - 1 ? '<button class="btn ghost sm" onclick="approvalPage++;loadApprovals()">Next</button>' : '');
    } else { pag.innerHTML = ''; }
  } catch(e) { console.error('approvals error:', e); }
}

async function openApproval(id) {
  try {
    var a = await api('/admin/api/approvals/' + id);
    document.getElementById('modalTitle').textContent = 'Approval: ' + esc(a.action_type || 'Detail');
    document.getElementById('modalBody').innerHTML =
      '<div class="flex" style="justify-content:space-between;margin-bottom:8px"><span class="muted">Status</span><span class="pill ' + (a.status === 'PENDING' ? 'warn' : (a.status === 'APPROVED' ? 'ok' : 'err')) + '">' + esc(a.status) + '</span></div>' +
      '<div class="flex" style="justify-content:space-between;margin-bottom:8px"><span class="muted">Risk level</span><span class="pill ' + (a.risk_level === 'high' ? 'err' : (a.risk_level === 'medium' ? 'warn' : 'muted')) + '">' + esc(a.risk_level || 'unknown') + '</span></div>' +
      '<div class="flex" style="justify-content:space-between;margin-bottom:8px"><span class="muted">Action type</span><span style="font-weight:600">' + esc(a.action_type || '—') + '</span></div>' +
      (a.action_value ? '<div class="flex" style="justify-content:space-between;margin-bottom:8px"><span class="muted">Value</span><span style="font-weight:600;font-family:monospace">' + esc(a.action_value) + '</span></div>' : '') +
      (a.reason ? '<div style="margin-top:12px;padding:12px;background:rgba(255,255,255,0.03);border-radius:6px"><div class="muted" style="font-size:11px;margin-bottom:4px">Reason</div><div style="font-size:13px">' + esc(a.reason) + '</div></div>' : '') +
      (a.simulation_result ? '<div style="margin-top:8px;padding:12px;background:rgba(255,255,255,0.03);border-radius:6px"><div class="muted" style="font-size:11px;margin-bottom:4px">Simulation result</div><div style="font-size:13px;font-family:monospace;white-space:pre-wrap">' + esc(a.simulation_result) + '</div></div>' : '') +
      (a.ai_confidence != null ? '<div style="margin-top:12px"><div class="flex" style="justify-content:space-between"><span class="muted">AI confidence</span><span style="font-weight:600">' + Math.round(a.ai_confidence * 100) + '%</span></div></div>' : '') +
      (a.created_at ? '<div class="muted" style="margin-top:8px;font-size:11px">Requested ' + a.created_at.slice(0, 19).replace('T', ' ') + '</div>' : '');

    var actions = document.getElementById('modalActions');
    if (a.status === 'PENDING') {
      actions.innerHTML =
        '<button class="btn sm" style="background:var(--green)" onclick="approveAction(\'' + a.id + '\')">Approve</button>' +
        '<button class="btn sm" style="background:var(--red)" onclick="rejectAction(\'' + a.id + '\')">Reject</button>' +
        '<button class="btn ghost sm" onclick="escalateAction(\'' + a.id + '\')">Escalate</button>';
    } else { actions.innerHTML = ''; }

    document.getElementById('approvalModal').style.display = 'flex';
  } catch(e) { console.error('approval detail error:', e); }
}

function closeApprovalModal() {
  document.getElementById('approvalModal').style.display = 'none';
}

async function approveAction(id) {
  try {
    await api('/admin/api/approvals/' + id + '/approve', { method: 'POST' });
    closeApprovalModal(); loadApprovals();
  } catch(e) { alert('Error: ' + e.message); }
}

async function rejectAction(id) {
  try {
    await api('/admin/api/approvals/' + id + '/reject', { method: 'POST' });
    closeApprovalModal(); loadApprovals();
  } catch(e) { alert('Error: ' + e.message); }
}

async function escalateAction(id) {
  try {
    await api('/admin/api/approvals/' + id + '/escalate', { method: 'POST' });
    closeApprovalModal(); loadApprovals();
  } catch(e) { alert('Error: ' + e.message); }
}

loadApprovals();
</script>

<style>
.modal-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.6);
  display:flex; align-items:center; justify-content:center; z-index:1000;
}
.modal {
  background:var(--bg); border:1px solid var(--border); border-radius:12px;
  width:90%; max-height:80vh; overflow-y:auto;
}
.modal-header { display:flex; justify-content:space-between; align-items:center; padding:16px 20px; border-bottom:1px solid var(--border); }
.modal-body { padding:16px 20px; }
</style>
{% endblock %}
