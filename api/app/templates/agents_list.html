{% extends "base.html" %}
{% block body %}
<link rel="stylesheet" href="/static/css/pages/agents.css">

<h2 style="font-size:20px;font-weight:700;margin-bottom:20px">Agents</h2>
<p style="font-size:14px;color:var(--muted2);margin-bottom:24px">Configure and manage your AI agents</p>

<div class="agent-grid" id="agentGrid"></div>
{% endblock %}

{% block tail %}
<script>
async function toggleAgent(agentId, current) {
  try {
    await api(`/admin/api/agents/${agentId}/toggle`, {
      method: 'POST',
      body: { enabled: !current },
    });
    loadAgents();
  } catch (e) {
    console.error('toggle failed', e);
  }
}

async function loadAgents() {
  try {
    const [agentsData, channelsData] = await Promise.all([
      api('/admin/api/agents'),
      api('/admin/api/integrations/available'),
    ]);

    const grid = document.getElementById('agentGrid');
    grid.innerHTML = agentsData.agents.map(a => {
      const isIncoming = a.agent_id === 'incoming_line';
      const iconBg = isIncoming ? 'rgba(91,192,222,0.12)' : 'rgba(107,114,128,0.12)';
      const iconColor = isIncoming ? 'var(--cyan)' : 'var(--muted2)';
      const iconSvg = isIncoming
        ? '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><use href="/static/svg/symbol-defs.svg#chat"/></svg>'
        : '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><use href="/static/svg/symbol-defs.svg#lock"/></svg>';

      // Channel icons
      const chMap = {};
      (channelsData.channels || []).forEach(c => { chMap[c.id] = c; });
      const wa = chMap['whatsapp'];
      const wd = chMap['web_widget'];
      const ig = chMap['instagram'];
      const channelHtml = `<div class="channel-icons">
        <div class="agent-card-channel ${wa && wa.connected ? 'active' : ''}" title="WhatsApp"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg></div>
        <div class="agent-card-channel ${ig && ig.connected ? 'active' : ''}" title="Instagram"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><use href="/static/svg/symbol-defs.svg#instagram"/></svg></div>
        <div class="agent-card-channel ${wd && wd.connected ? 'active' : ''}" title="Widget"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/><line x1="8" y1="10" x2="16" y2="10"/><line x1="12" y1="7" x2="12" y2="13"/></svg></div>
      </div>`;

      // Stats
      const statHtml = isIncoming
        ? `<span class="agent-card-stat" id="stat-${a.agent_id}">— conversations this month</span>`
        : '';

      const cardContent = a.enabled === false
        ? `<div class="agent-card-lock">This agent is currently disabled. Enable it to start configuring.</div>`
        : '';

      return `<div class="agent-card" onclick="window.location.href='/admin/agents/${a.agent_id}'">
        <div class="agent-card-top">
          <div class="agent-card-icon" style="background:${iconBg};color:${iconColor}">${iconSvg}</div>
          <div class="agent-card-info">
            <div class="agent-card-name">${a.agent_id === 'incoming_line' ? 'Incoming Line' : a.agent_id}</div>
            <div class="agent-card-desc">${a.description || ''}</div>
            <div class="agent-card-meta">
              ${channelHtml}
              ${statHtml}
            </div>
          </div>
          <div class="toggle-wrap">
            <div class="toggle-switch ${a.enabled !== false ? 'on' : ''}" onclick="event.stopPropagation();toggleAgent('${a.agent_id}', ${a.enabled !== false})"></div>
          </div>
        </div>
        ${cardContent}
      </div>`;
    }).join('');

    // Load stats
    if (agentsData.agents.some(a => a.agent_id === 'incoming_line')) {
      try {
        const statData = await api('/admin/api/agents/incoming_line/stats');
        const el = document.getElementById('stat-incoming_line');
        if (el) el.textContent = `${statData.conversations_this_month || 0} conversations this month`;
      } catch (e) { /* ignore */ }
    }

  } catch (e) {
    document.getElementById('agentGrid').innerHTML = `<div class="card" style="padding:40px;text-align:center;color:var(--muted2)">Error loading agents: ${e.message}</div>`;
  }
}

loadAgents();
</script>
{% endblock %}
