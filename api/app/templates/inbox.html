{% extends "base.html" %}
{% block head %}
<link rel="stylesheet" href="/static/css/inbox.css">
{% endblock %}
{% block body %}
<div id="inboxApp">
  <div class="inbox-layout">
    <div class="inbox-list" id="convList">
      <div class="inbox-list-header">
        <h2>Inbox</h2>
        <span class="inbox-badge" id="totalBadge">0</span>
        <span class="inbox-badge" id="handoffBadge" style="display:none;background:var(--red);">!</span>
      </div>
      <div class="inbox-search-wrap">
        <span class="inbox-search-icon">🔍</span>
        <input id="filterSearch" placeholder="Search..." oninput="debounceSearch()"/>
      </div>
      <div class="inbox-status-tabs">
        <button class="inbox-status-tab active" data-status="" onclick="setStatusTab(this)">All</button>
        <button class="inbox-status-tab" data-status="active" onclick="setStatusTab(this)">Active</button>
        <button class="inbox-status-tab" data-status="waiting" onclick="setStatusTab(this)">Waiting</button>
        <button class="inbox-status-tab" data-status="handoff_requested" onclick="setStatusTab(this)">Handoff</button>
        <button class="inbox-status-tab" data-status="assigned" onclick="setStatusTab(this)">Assigned</button>
        <button class="inbox-status-tab" data-status="closed" onclick="setStatusTab(this)">Closed</button>
      </div>
      <div class="inbox-convs" id="convItems"></div>
      <div class="inbox-pagination" id="convPagination"></div>
    </div>
    <div class="inbox-detail" id="convDetail">
      <div class="inbox-empty" id="emptyState">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="width:48px;height:48px;color:var(--muted2);margin-bottom:12px"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg>
        <p>Select a conversation</p>
      </div>
      <div class="inbox-messages" id="messagesArea" style="display:none">
        <div class="inbox-detail-header" id="detailHeader"></div>
        <div class="inbox-msgs" id="msgList"></div>
        <div class="inbox-notes" id="notesArea" style="display:none">
          <div class="inbox-notes-list" id="notesList"></div>
          <div class="inbox-notes-input"><input id="noteInput" placeholder="Add internal note..." onkeydown="if(event.key==='Enter')addNote()"/></div>
        </div>
        <div class="inbox-reply" id="replyArea">
          <button class="ghost sm" id="cannedBtn" onclick="toggleCanned()" title="Canned responses" style="font-size:16px;padding:4px 8px;">⚡</button>
          <input id="replyInput" placeholder="Type a message... (/ for canned)" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendReply()}"/>
          <button onclick="sendReply()" class="accent sm">Send</button>
          <div class="canned-popup" id="cannedPopup" style="display:none">
            <div class="canned-header">Canned Responses <button class="ghost xs" onclick="showNewCanned()" style="margin-left:auto;font-size:10px">+ New</button></div>
            <div class="canned-list" id="cannedList"></div>
            <div class="canned-new" id="cannedNew" style="display:none;padding:8px;border-top:1px solid var(--border)">
              <input id="cannedTitle" placeholder="Title" style="width:100%;margin-bottom:4px;padding:5px 8px;font-size:11px;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:4px;outline:none;box-sizing:border-box"/>
              <input id="cannedShortcut" placeholder="Shortcut (e.g. greeting)" style="width:100%;margin-bottom:4px;padding:5px 8px;font-size:11px;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:4px;outline:none;box-sizing:border-box"/>
              <textarea id="cannedContent" placeholder="Response text" rows="3" style="width:100%;margin-bottom:4px;padding:5px 8px;font-size:11px;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:4px;outline:none;resize:vertical;box-sizing:border-box"></textarea>
              <button class="accent xs" onclick="saveNewCanned()" style="width:100%">Save</button>
            </div>
          </div>
        </div>
      </div>
      <div class="inbox-profile" id="profilePanel" style="display:none">
        <div class="profile-header" id="profileHeader"></div>
        <div class="profile-body" id="profileBody">
          <div class="profile-section" id="profileInfo"></div>
          <div class="profile-section" id="profileRisk"></div>
          <div class="profile-section" id="profileSubscriptions"></div>
          <div class="profile-section" id="profileConversations"></div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
{% block tail %}
<script src="/static/js/inbox.js"></script>
{% endblock %}
