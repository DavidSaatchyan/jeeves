{% extends "base.html" %}
{% block body %}
<h1>Inbox</h1>
<p class="page-desc">Human + AI collaboration layer — conversations needing attention.</p>

<div class="inbox-layout">
  <div class="card inbox-list-panel">
    <div class="card-header">
      <h2>Conversations</h2>
      <select id="inboxFilter" onchange="loadInbox()" style="width:auto">
        <option value="escalated">Escalated</option>
        <option value="all">All</option>
      </select>
    </div>
    <div id="inboxList" class="muted" style="padding:4px 0">Loading...</div>
    <div id="inboxPagination" class="flex" style="justify-content:center;padding:8px;gap:8px"></div>
  </div>

  <div class="card inbox-thread-panel">
    <div class="inbox-thread-header">
      <h2 id="threadTitle">Select a conversation</h2>
    </div>
    <div id="threadBody" class="inbox-thread-body">
      <div class="muted" style="text-align:center;padding:40px">Select a conversation to view the thread.</div>
    </div>
    <div class="inbox-thread-actions" id="threadActions" style="display:none">
      <button class="btn sm" onclick="takeoverConversation()">Take over</button>
      <button class="btn ghost sm" onclick="suggestResponse()">AI suggest</button>
    </div>
    <div id="aiSuggestArea" style="display:none;padding:12px;border-top:1px solid var(--border)">
      <div id="aiSuggestionText" class="muted" style="font-size:13px;margin-bottom:8px"></div>
      <button class="btn sm" onclick="acceptSuggestion()">Use response</button>
      <button class="ghost sm" onclick="dismissSuggestion()">Dismiss</button>
    </div>
  </div>

  <!-- Right Context Panel -->
  <div class="card inbox-context-panel" id="contextPanel" style="display:none">
    <h3 style="font-size:13px;margin-bottom:12px;text-transform:uppercase;letter-spacing:0.3px;color:var(--muted2)">Customer context</h3>
    <div id="contextProfile" class="muted" style="font-size:12px">Select a conversation.</div>
  </div>
</div>

<script>
var inboxPage = 0;
var currentSessionId = null;
var currentSuggestion = '';

async function loadInbox() {
  var filter = document.getElementById('inboxFilter').value;
  var params = '?skip=' + (inboxPage * 20) + '&limit=20';
  if (filter === 'escalated') params += '&resolution=escalated';

  try {
    var data = await api('/admin/api/inbox' + params);
    var conversations = data.conversations || [];
    var total = data.total || 0;

    document.getElementById('inboxList').innerHTML = conversations.length
      ? conversations.map(function(c){
          var lastMsg = c.last_message || c.last_response || '';
          var lastTime = c.last_at || c.created_at || '';
          return '<div class="tl-row inbox-item" data-session="' + esc(c.session_id) + '" onclick="openThread(\'' + esc(c.session_id) + '\')" style="cursor:pointer">' +
            '<div style="flex:1;min-width:0">' +
            '<div style="font-weight:600;font-size:13px">' + esc(c.customer_name || c.user_id || c.session_id.slice(0, 8)) + '</div>' +
            '<div class="muted" style="font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + esc(lastMsg.slice(0, 60)) + '</div>' +
            '</div>' +
            '<span class="muted2" style="font-size:10px;white-space:nowrap">' + (lastTime ? lastTime.slice(0, 10) : '') + '</span>' +
            '</div>';
        }).join('')
      : '<div class="muted" style="text-align:center;padding:24px">No conversations found.</div>';

    var pages = Math.ceil(total / 20);
    var pag = document.getElementById('inboxPagination');
    if (pages > 1) {
      pag.innerHTML = (inboxPage > 0 ? '<button class="btn ghost sm" onclick="inboxPage--;loadInbox()">Prev</button>' : '') +
        '<span class="muted" style="font-size:12px">' + (inboxPage + 1) + ' / ' + pages + '</span>' +
        (inboxPage < pages - 1 ? '<button class="btn ghost sm" onclick="inboxPage++;loadInbox()">Next</button>' : '');
    } else { pag.innerHTML = ''; }
  } catch(e) { console.error('inbox error:', e); }
}

async function openThread(sessionId, userId) {
  currentSessionId = sessionId;
  document.getElementById('threadTitle').textContent = 'Conversation';
  document.getElementById('threadBody').innerHTML = '<div class="muted" style="text-align:center;padding:40px">Loading...</div>';
  document.getElementById('threadActions').style.display = 'none';
  document.getElementById('aiSuggestArea').style.display = 'none';

  try {
    var data = await api('/admin/api/inbox/' + sessionId);
    var messages = data.messages || [];
    var userId = data.user_id || (messages.length ? messages[0].user_id : null);

    document.getElementById('threadBody').innerHTML = messages.length
      ? messages.map(function(m){
          var isAi = m.direction === 'received';
          return '<div class="inbox-msg ' + (isAi ? 'inbox-msg-ai' : 'inbox-msg-human') + '">' +
            '<div class="inbox-msg-sender">' + (isAi ? 'AI' : 'Customer') + '</div>' +
            '<div class="inbox-msg-text">' + esc(m.message || m.response || '') + '</div>' +
            '<div class="inbox-msg-time muted2">' + (m.created_at ? m.created_at.slice(11, 19) : '') + '</div>' +
            '</div>';
        }).join('')
      : '<div class="muted" style="text-align:center;padding:40px">No messages in this conversation.</div>';
    document.getElementById('threadActions').style.display = 'flex';

    // Load context panel
    await loadContextPanel(userId);
  } catch(e) { console.error('thread error:', e); }
}

async function loadContextPanel(userId) {
  var panel = document.getElementById('contextPanel');
  if (!userId) { panel.style.display = 'none'; return; }

  panel.style.display = '';
  document.getElementById('contextProfile').innerHTML = 'Loading context...';

  try {
    // Find customer by email/userId
    var custData = await api('/admin/api/customers?q=' + encodeURIComponent(userId) + '&limit=1');
    var customers = custData.customers || [];
    if (customers.length) {
      var c = customers[0];
      var ctxData = await api('/admin/api/customers/' + c.id + '/context');
      var ctx = ctxData || {};
      var html =
        '<div class="flex" style="justify-content:space-between;margin-bottom:6px"><span class="muted2" style="font-size:10px">Name</span><span style="font-weight:600;font-size:12px">' + esc(c.name || '—') + '</span></div>' +
        '<div class="flex" style="justify-content:space-between;margin-bottom:6px"><span class="muted2" style="font-size:10px">Email</span><span style="font-size:11px">' + esc(c.email || '—') + '</span></div>' +
        '<div class="flex" style="justify-content:space-between;margin-bottom:6px"><span class="muted2" style="font-size:10px">Risk</span><span class="pill ' + (c.risk_level === 'high' ? 'err' : c.risk_level === 'medium' ? 'warn' : 'muted') + '" style="font-size:9px;text-transform:capitalize">' + esc(c.risk_level || 'unknown') + '</span></div>' +
        '<div class="flex" style="justify-content:space-between;margin-bottom:6px"><span class="muted2" style="font-size:10px">Workflows</span><span style="font-size:11px">' + (c.total_workflows || 0) + '</span></div>' +
        '<div class="flex" style="justify-content:space-between;margin-bottom:12px"><span class="muted2" style="font-size:10px">Escalations</span><span style="font-size:11px">' + (c.total_escalations || 0) + '</span></div>';
      if (ctx.summary) {
        html += '<div style="padding:8px;background:rgba(255,255,255,0.03);border-radius:6px;font-size:11px;line-height:1.5;margin-bottom:8px">' + esc(ctx.summary) + '</div>';
      }
      var anomalies = ctx.anomalies || [];
      if (anomalies.length) {
        html += '<div class="muted2" style="font-size:10px;text-transform:uppercase;letter-spacing:0.3px;margin-bottom:4px">Anomalies</div>';
        html += anomalies.map(function(a){ return '<div style="font-size:11px;color:var(--red);padding:2px 0">⚠ ' + esc(a) + '</div>'; }).join('');
      }
      var recs = ctx.recommended_actions || [];
      if (recs.length) {
        html += '<div class="muted2" style="font-size:10px;text-transform:uppercase;letter-spacing:0.3px;margin-top:8px;margin-bottom:4px">Suggested actions</div>';
        html += recs.map(function(r){ return '<div style="font-size:11px;color:var(--accent);padding:2px 0;cursor:pointer">→ ' + esc(r) + '</div>'; }).join('');
      }
      document.getElementById('contextProfile').innerHTML = html;
    } else {
      document.getElementById('contextProfile').innerHTML = '<div class="muted" style="text-align:center;padding:16px;font-size:12px">Customer not found.</div>';
    }
  } catch(e) {
    document.getElementById('contextProfile').innerHTML = '<div class="muted" style="text-align:center;padding:16px;font-size:12px">Context unavailable.</div>';
  }
}

async function takeoverConversation() {
  if (!currentSessionId) return;
  try {
    await api('/admin/api/inbox/' + currentSessionId + '/takeover', { method: 'POST' });
    alert('Conversation taken over.');
  } catch(e) { alert('Takeover failed: ' + e.message); }
}

async function suggestResponse() {
  if (!currentSessionId) return;
  try {
    var data = await api('/admin/api/inbox/' + currentSessionId + '/suggest', { method: 'POST' });
    currentSuggestion = data.suggestion || '';
    document.getElementById('aiSuggestionText').textContent = currentSuggestion;
    document.getElementById('aiSuggestArea').style.display = '';
  } catch(e) { alert('Suggestion failed: ' + e.message); }
}

function acceptSuggestion() {
  document.getElementById('aiSuggestArea').style.display = 'none';
  alert('Response ready. (Copy from suggestion area)');
}

function dismissSuggestion() {
  document.getElementById('aiSuggestArea').style.display = 'none';
}

loadInbox();
</script>

<style>
.inbox-layout { display:grid; grid-template-columns:280px 1fr 240px; gap:12px; align-items:start; }
.inbox-list-panel { max-height:70vh; overflow-y:auto; }
.inbox-item { padding:8px 10px; border-radius:6px; }
.inbox-item:hover { background:rgba(129,140,248,0.06); }
.inbox-thread-panel { display:flex; flex-direction:column; min-height:400px; }
.inbox-thread-header { padding:10px 14px; border-bottom:1px solid var(--border); }
.inbox-thread-body { flex:1; padding:10px 14px; overflow-y:auto; max-height:55vh; }
.inbox-thread-actions { display:flex; gap:6px; padding:10px 14px; border-top:1px solid var(--border); }
.inbox-msg { margin-bottom:10px; padding:8px 12px; border-radius:8px; max-width:85%; }
.inbox-msg-ai { background:rgba(129,140,248,0.08); margin-right:auto; }
.inbox-msg-human { background:rgba(255,255,255,0.04); margin-left:auto; }
.inbox-msg-sender { font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:0.3px; margin-bottom:3px; color:var(--accent); }
.inbox-msg-text { font-size:12px; line-height:1.5; }
.inbox-msg-time { font-size:10px; margin-top:3px; }
.inbox-context-panel { font-size:12px; max-height:70vh; overflow-y:auto; padding:14px; }
@media (max-width:1000px) { .inbox-layout { grid-template-columns:1fr; } .inbox-context-panel { display:none !important; } }
</style>
{% endblock %}
