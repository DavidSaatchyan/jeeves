{% extends "base.html" %}
{% block body %}
<style>aside{display:none}main{max-width:none}</style>
<div class="card" style="max-width:440px;margin:60px auto">
  <h1>Sign in / Sign up</h1>
  <div id="tabs" class="row" style="margin-bottom:14px">
    <button id="tabLogin" class="ghost" onclick="setMode('login')">Login</button>
    <button id="tabReg" class="ghost" onclick="setMode('register')">Register</button>
  </div>
  <div id="regFields" style="display:none">
    <label>Company / tenant name</label>
    <input id="tname" type="text" placeholder="Acme Inc."/>
  </div>
  <label>Email</label>
  <input id="email" type="email" placeholder="you@company.com"/>
  <label>Password (min 8 chars)</label>
  <input id="password" type="password"/>
  <div style="margin-top:16px"><button id="submit" onclick="go()">Continue</button></div>
  <div class="err-msg" id="err"></div>
</div>
{% endblock %}
{% block tail %}
<script>
let mode='login';
function setMode(m){
  mode=m;
  document.getElementById('regFields').style.display = m==='register'?'block':'none';
  document.getElementById('tabLogin').style.background = m==='login'?'var(--acc)':'transparent';
  document.getElementById('tabLogin').style.color = m==='login'?'#0b1020':'var(--fg)';
  document.getElementById('tabReg').style.background = m==='register'?'var(--acc)':'transparent';
  document.getElementById('tabReg').style.color = m==='register'?'#0b1020':'var(--fg)';
}
setMode('login');
async function go(){
  const err=document.getElementById('err'); err.textContent='';
  const email=document.getElementById('email').value.trim();
  const password=document.getElementById('password').value;
  try{
    if(mode==='register'){
      const tenant_name=document.getElementById('tname').value.trim()||email.split('@')[0];
      const r = await fetch('/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password,tenant_name})});
      const data = await r.json();
      if(!r.ok) throw new Error(data.detail||'failed');
      setToken(data.access_token, data.tenant_id);
    } else {
      const r = await fetch('/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
      const data = await r.json();
      if(!r.ok) throw new Error(data.detail||'failed');
      setToken(data.access_token, data.tenant_id);
    }
    location.href='/admin';
  }catch(e){ err.textContent = e.message; }
}
</script>
{% endblock %}
