{% extends "base.html" %}
{% block body %}
<style>
aside{display:none}
main{display:block;padding:0;max-width:none;}

.auth-page{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;position:relative;background:radial-gradient(ellipse at 50% 0%,rgba(99,102,241,0.06) 0%,transparent 60%);}

.back-link{position:absolute;top:24px;left:24px;}
.back-link a{font-size:13px;color:var(--muted2);text-decoration:none;transition:color .2s;}
.back-link a:hover{color:var(--text);}

.auth-wrapper{width:100%;max-width:420px;animation:authFadeIn .5s ease both;margin-bottom:40px;}
@keyframes authFadeIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}

.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:40px 36px 36px;box-shadow:0 8px 40px rgba(0,0,0,0.4),0 0 0 1px rgba(255,255,255,0.02) inset;}

.auth-header{text-align:center;margin-bottom:32px;}
.auth-header .brand-mark{width:40px;height:40px;border-radius:10px;background:linear-gradient(145deg,rgba(99,102,241,0.15),rgba(99,102,241,0.05));border:1px solid rgba(99,102,241,0.12);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:18px;font-weight:900;color:var(--accent);font-family:'SF Mono',ui-monospace,Consolas,monospace;}
.auth-header h1{font-size:20px;font-weight:800;letter-spacing:-.3px;margin-bottom:4px;}
.auth-header h1 span{color:var(--accent);}
.auth-header .sub{font-size:13px;color:var(--muted);}

/* Tab switcher */
.auth-tabs{display:flex;background:var(--bg);border-radius:10px;padding:3px;margin-bottom:28px;position:relative;}
.auth-tabs .tab-indicator{position:absolute;top:3px;left:3px;width:calc(50% - 3px);height:calc(100% - 6px);background:var(--surface2);border:1px solid var(--border);border-radius:8px;transition:transform .3s cubic-bezier(.4,0,.2,1);pointer-events:none;}
.auth-tabs.register .tab-indicator{transform:translateX(100%);}
.auth-tab-btn{flex:1;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;background:transparent!important;color:var(--muted2);border:none;transition:color .25s ease;position:relative;z-index:1;}
.auth-tab-btn.active{color:#fff;}
.auth-tab-btn:hover{color:var(--text);background:transparent!important;box-shadow:none!important;}
.auth-tab-btn.active:hover{color:#fff;background:transparent!important;box-shadow:none!important;}

/* Fields */
.field-group{max-height:0;opacity:0;overflow:hidden;transition:max-height .35s cubic-bezier(.4,0,.2,1),opacity .25s ease,margin .35s ease;margin:0;}
.field-group.open{max-height:80px;opacity:1;margin-bottom:18px;}
.field-group label,.auth-field label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px;letter-spacing:.3px;}
.field-group input,.auth-field input{width:100%;padding:10px 14px;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:10px;outline:none;font-family:inherit;font-size:13px;transition:border-color .15s,box-shadow .15s;}
.field-group input:focus,.auth-field input:focus{border-color:rgba(99,102,241,0.4);box-shadow:0 0 0 3px rgba(99,102,241,0.08);}
.field-group input::placeholder,.auth-field input::placeholder{color:var(--muted2);}
.auth-field{margin-bottom:18px;}
.pw-strength-wrap{position:relative;}

/* Terms checkbox */
.auth-terms-check{margin-bottom:18px;overflow:hidden;transition:max-height .35s cubic-bezier(.4,0,.2,1),opacity .25s ease,margin .35s ease;}
.auth-terms-check label{display:flex;align-items:flex-start;gap:8px;cursor:pointer;font-size:12px;color:var(--muted);margin:0;}
.auth-terms-check label a{color:var(--accent);text-decoration:none;font-weight:500;}
.auth-terms-check label a:hover{text-decoration:underline;}
.auth-terms-check input[type="checkbox"]{margin-top:2px;accent-color:var(--accent);flex-shrink:0;cursor:pointer;}

/* Submit */
.auth-submit{margin-top:6px;}
.auth-submit button{width:100%;justify-content:center;padding:12px;font-size:14px;border-radius:10px;background:var(--accent);color:#fff;border:none;font-weight:700;cursor:pointer;transition:all .2s ease;display:flex;align-items:center;gap:6px;}
.auth-submit button:hover:not(:disabled){background:#6366f1;box-shadow:0 4px 16px rgba(99,102,241,0.3);transform:translateY(-1px);}
.auth-submit button:active:not(:disabled){transform:translateY(0);}
.auth-submit button:disabled{opacity:.35;cursor:not-allowed;transform:none;box-shadow:none;}

.auth-footer{text-align:center;margin-top:20px;font-size:12px;color:var(--muted2);}

.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

.err-msg{text-align:center;margin-top:12px;font-size:13px;color:var(--red);min-height:20px;transition:opacity .2s;}
.err-msg:empty{opacity:0;}

/* Password strength bar */
.pw-strength{height:3px;border-radius:2px;background:var(--border);margin-top:8px;overflow:hidden;opacity:0;transition:opacity .25s;}
.pw-strength.visible{opacity:1;}
.pw-strength-bar{height:100%;width:0;border-radius:2px;transition:width .3s ease,background .3s ease;}

/* Page footer - fixed at bottom */
.auth-page-footer{position:fixed;bottom:0;left:0;right:0;text-align:center;padding:16px 24px;background:rgba(4,6,8,0.85);backdrop-filter:blur(12px);border-top:1px solid var(--border);z-index:50;}
.auth-page-footer .footer-links{display:flex;justify-content:center;gap:16px;margin-bottom:4px;}
.auth-page-footer a{color:var(--muted2);text-decoration:none;font-size:12px;transition:color .2s;border:none;}
.auth-page-footer a:hover{color:var(--text);}
.auth-page-footer>span{font-size:11px;color:var(--muted2);}

@media (max-width: 640px) {
  .auth-page { padding: 60px 16px 80px; }
  .back-link { top: 16px; left: 16px; }
  .back-link a { font-size: 14px; }
  .auth-wrapper { max-width: 100%; }
  .auth-card { padding: 28px 20px 24px; }
}
</style>

<div class="auth-page">
  <div class="back-link"><a href="/">← Back</a></div>

  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-header">
        <div class="brand-mark">J</div>
        <h1>Jeeves<span>.</span></h1>
        <div class="sub" id="authSub">Sign in to your admin panel</div>
      </div>

      <div class="auth-tabs" id="authTabs">
        <div class="tab-indicator"></div>
        <button class="auth-tab-btn active" id="tabLogin" onclick="setMode('login')">Sign in</button>
        <button class="auth-tab-btn" id="tabReg" onclick="setMode('register')">Sign up</button>
      </div>

      <div class="field-group" id="regFields">
        <label>Company</label>
        <input id="tname" type="text" placeholder="Acme Inc." autocomplete="off"/>
      </div>

      <div class="auth-field">
        <label>Email</label>
        <input id="email" type="email" placeholder="you@company.com" autocomplete="email"/>
      </div>

      <div class="auth-field">
        <label>Password</label>
        <div class="pw-strength-wrap">
          <input id="password" type="password" placeholder="Min 8 characters" autocomplete="current-password"/>
          <div class="pw-strength" id="pwStrength"><div class="pw-strength-bar" id="pwBar"></div></div>
        </div>
      </div>

      <div id="termsCheck" class="auth-terms-check" style="max-height:0;opacity:0;margin:0;">
        <label>
          <input type="checkbox" id="termsCheckbox"/>
          <span>I agree to the <a href="/terms">Terms of Service</a> and <a href="/privacy">Privacy Policy</a></span>
        </label>
      </div>

      <div class="auth-submit">
        <button id="submitBtn" onclick="go()" disabled><span id="btnText">Continue</span></button>
      </div>

      <div class="err-msg" id="err"></div>

      <div class="auth-footer" id="authFooter">Don't have an account? <a href="javascript:void(0)" onclick="setMode('register')" style="color:var(--accent);border:none;font-weight:600;">Sign up</a></div>
    </div>
  </div>

  <div class="auth-page-footer">
    <div class="footer-links">
      <a href="/terms">Terms</a>
      <a href="/privacy">Privacy</a>
    </div>
    <span>&copy; 2026 Jeeves</span>
  </div>
</div>
{% endblock %}

{% block tail %}
<script>
let mode='login';
function setMode(m){
  mode=m;
  var rf=document.getElementById('regFields');
  var tabs=document.getElementById('authTabs');
  var sub=document.getElementById('authSub');
  var footer=document.getElementById('authFooter');
  var pw=document.getElementById('password');

  if(m==='register'){
    document.getElementById('email').value='';
    document.getElementById('password').value='';
    document.getElementById('tname').value='';
    rf.classList.add('open');
    tabs.classList.add('register');
    document.getElementById('tabReg').classList.add('active');
    document.getElementById('tabLogin').classList.remove('active');
    sub.textContent='Create your workspace';
    footer.innerHTML='Already have an account? <a href="javascript:void(0)" onclick="setMode(\'login\')" style="color:var(--accent);border:none;font-weight:600;">Sign in</a>';
    pw.setAttribute('autocomplete','new-password');
    document.getElementById('pwStrength').classList.add('visible');
    var tc=document.getElementById('termsCheck');
    tc.style.maxHeight='60px';tc.style.opacity='1';tc.style.marginBottom='18px';
  } else {
    document.getElementById('email').value='';
    document.getElementById('password').value='';
    document.getElementById('tname').value='';
    rf.classList.remove('open');
    tabs.classList.remove('register');
    document.getElementById('tabLogin').classList.add('active');
    document.getElementById('tabReg').classList.remove('active');
    sub.textContent='Sign in to your admin panel';
    footer.innerHTML='Don\'t have an account? <a href="javascript:void(0)" onclick="setMode(\'register\')" style="color:var(--accent);border:none;font-weight:600;">Sign up</a>';
    pw.setAttribute('autocomplete','current-password');
    document.getElementById('pwStrength').classList.remove('visible');
    var tc=document.getElementById('termsCheck');
    tc.style.maxHeight='0';tc.style.opacity='0';tc.style.marginBottom='0';
    document.getElementById('termsCheckbox').checked=false;
  }
  validateForm();
}
setMode('login');

/* Password strength indicator */
document.getElementById('password').addEventListener('input',function(){
  if(mode!=='register') return;
  var pw=this.value;
  var bar=document.getElementById('pwBar');
  var score=0;
  if(pw.length>=8) score++;
  if(/[A-Z]/.test(pw)) score++;
  if(/[0-9]/.test(pw)) score++;
  if(/[^A-Za-z0-9]/.test(pw)) score++;
  var w=[0,25,50,75,100][score];
  var c=['var(--red)','#f59e0b','#eab308','var(--green)','var(--green)'][score];
  bar.style.width=w+'%';
  bar.style.background=c;
  validateForm();
});

document.getElementById('termsCheckbox').addEventListener('change',validateForm);
document.getElementById('email').addEventListener('input',validateForm);
document.getElementById('password').addEventListener('input',validateForm);
document.getElementById('tname').addEventListener('input',validateForm);

function validateForm(){
  var email=document.getElementById('email').value.trim();
  var password=document.getElementById('password').value;
  var valid=email.length>0&&password.length>=8;
  if(mode==='register'){
    var tname=document.getElementById('tname').value.trim();
    valid=valid&&document.getElementById('termsCheckbox').checked&&tname.length>0;
  }
  document.getElementById('submitBtn').disabled=!valid;
}

async function go(){
  var err=document.getElementById('err');err.textContent='';
  var btn=document.getElementById('submitBtn');
  var btnText=document.getElementById('btnText');
  var email=document.getElementById('email').value.trim();
  var password=document.getElementById('password').value;

  if(!email||!password){err.textContent='Please fill in all fields.';return;}
  if(password.length<8){err.textContent='Password must be at least 8 characters.';return;}
  if(mode==='register'){
    if(!document.getElementById('tname').value.trim()){err.textContent='Company name is required.';return;}
    if(!document.getElementById('termsCheckbox').checked){err.textContent='Please agree to the Terms of Service and Privacy Policy.';return;}
  }

  btn.disabled=true;
  btnText.innerHTML='<span class="spinner"></span>';

  try{
    if(mode==='register'){
      var tenant_name=document.getElementById('tname').value.trim()||email.split('@')[0];
      var r=await fetch('/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password,tenant_name})});
      var data=await r.json();
      if(!r.ok) throw new Error(data.detail||'Registration failed');
      setToken(data.access_token,data.tenant_id);
      await fetch('/admin/login',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:'email='+encodeURIComponent(email)+'&password='+encodeURIComponent(password)});
    } else {
      var r=await fetch('/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
      var data=await r.json();
      if(!r.ok) throw new Error(data.detail||'Invalid credentials');
      setToken(data.access_token,data.tenant_id);
      await fetch('/admin/login',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:'email='+encodeURIComponent(email)+'&password='+encodeURIComponent(password)});
    }
    location.href='/admin';
  }catch(e){
    err.textContent=e.message;
    btn.disabled=false;
    btnText.textContent='Continue';
    validateForm();
  }
}

document.getElementById('password').addEventListener('keydown',function(e){if(e.key==='Enter')go()});
document.getElementById('email').addEventListener('keydown',function(e){if(e.key==='Enter')go()});
document.getElementById('tname').addEventListener('keydown',function(e){if(e.key==='Enter')go()});
</script>
{% endblock %}
