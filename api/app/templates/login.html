{% extends "base.html" %}
{% block body %}
<style>
aside{display:none}
main{max-width:none;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;background:radial-gradient(ellipse at 50% 0%,rgba(99,102,241,0.06) 0%,transparent 60%);}

.auth-wrapper{width:100%;max-width:420px;animation:authFadeIn .5s ease both;}
@keyframes authFadeIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}

.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:40px 36px 36px;box-shadow:0 8px 40px rgba(0,0,0,0.4),0 0 0 1px rgba(255,255,255,0.02) inset;}

.auth-header{text-align:center;margin-bottom:32px;}
.auth-header .brand-mark{width:40px;height:40px;border-radius:10px;background:linear-gradient(145deg,rgba(99,102,241,0.15),rgba(99,102,241,0.05));border:1px solid rgba(99,102,241,0.12);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:18px;font-weight:900;color:var(--accent);font-family:'SF Mono',ui-monospace,Consolas,monospace;}
.auth-header h1{font-size:20px;font-weight:800;letter-spacing:-.3px;margin-bottom:4px;}
.auth-header h1 span{color:var(--accent);}
.auth-header .sub{font-size:13px;color:var(--muted);}

/* Tab switcher */
.auth-tabs{display:flex;background:var(--bg);border-radius:10px;padding:3px;margin-bottom:28px;position:relative;}
.auth-tabs .tab-indicator{position:absolute;top:3px;left:3px;width:calc(50% - 3px);height:calc(100% - 6px);background:var(--surface2);border:1px solid var(--border);border-radius:8px;transition:transform .3s cubic-bezier(.4,0,.2,1);pointer-events:none;}
.auth-tabs.register .tab-indicator{transform:translateX(100%);}
.auth-tab-btn{flex:1;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;background:transparent;color:var(--muted2);border:none;transition:color .25s ease;position:relative;z-index:1;}
.auth-tab-btn.active{color:var(--text);}

/* Fields */
.field-group{margin-bottom:18px;overflow:hidden;transition:max-height .35s cubic-bezier(.4,0,.2,1),opacity .25s ease;margin-bottom:0;}
.field-group.open{margin-bottom:18px;}
.field-group label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px;letter-spacing:.3px;}
.field-group input{width:100%;padding:10px 14px;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:10px;outline:none;font-family:inherit;font-size:13px;transition:border-color .15s,box-shadow .15s;}
.field-group input:focus{border-color:rgba(99,102,241,0.4);box-shadow:0 0 0 3px rgba(99,102,241,0.08);}
.field-group input::placeholder{color:var(--muted2);}

/* Submit */
.auth-submit{margin-top:24px;}
.auth-submit button{width:100%;justify-content:center;padding:12px;font-size:14px;border-radius:10px;background:var(--accent);color:#fff;border:none;font-weight:700;cursor:pointer;transition:all .2s ease;display:flex;align-items:center;gap:6px;}
.auth-submit button:hover:not(:disabled){background:#6366f1;box-shadow:0 4px 16px rgba(99,102,241,0.3);transform:translateY(-1px);}
.auth-submit button:active:not(:disabled){transform:translateY(0);}
.auth-submit button:disabled{opacity:.5;cursor:default;}

.auth-footer{text-align:center;margin-top:20px;font-size:12px;color:var(--muted2);}

.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

.err-msg{text-align:center;margin-top:12px;font-size:13px;color:var(--red);min-height:20px;transition:opacity .2s;}
.err-msg:empty{opacity:0;}

/* Password strength bar */
.pw-strength{height:3px;border-radius:2px;background:var(--border);margin-top:8px;overflow:hidden;opacity:0;transition:opacity .25s;}
.pw-strength.visible{opacity:1;}
.pw-strength-bar{height:100%;width:0;border-radius:2px;transition:width .3s ease,background .3s ease;}
</style>

<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <div class="brand-mark">J</div>
      <h1>Jeeves<span>.</span></h1>
      <div class="sub" id="authSub">Sign in to your admin panel</div>
    </div>

    <div class="auth-tabs" id="authTabs">
      <div class="tab-indicator"></div>
      <button class="auth-tab-btn active" id="tabLogin" onclick="setMode('login')">Sign in</button>
      <button class="auth-tab-btn" id="tabReg" onclick="setMode('register')">Sign up</button>
    </div>

    <div class="field-group" id="regFields">
      <label>Company / tenant name</label>
      <input id="tname" type="text" placeholder="Acme Inc."/>
    </div>

    <div class="field-group">
      <label>Email</label>
      <input id="email" type="email" placeholder="you@company.com" autocomplete="email"/>
    </div>

    <div class="field-group">
      <label>Password</label>
      <input id="password" type="password" placeholder="Min 8 characters" autocomplete="current-password"/>
      <div class="pw-strength" id="pwStrength"><div class="pw-strength-bar" id="pwBar"></div></div>
    </div>

    <div class="auth-submit">
      <button id="submitBtn" onclick="go()"><span id="btnText">Continue</span></button>
    </div>

    <div class="err-msg" id="err"></div>

    <div class="auth-footer" id="authFooter">Don't have an account? <a href="javascript:void(0)" onclick="setMode('register')" style="color:var(--accent);border:none;font-weight:600;">Sign up</a></div>
  </div>
</div>
{% endblock %}

{% block tail %}
<script>
let mode='login';
function setMode(m){
  mode=m;
  var rf=document.getElementById('regFields');
  var tabs=document.getElementById('authTabs');
  var sub=document.getElementById('authSub');
  var footer=document.getElementById('authFooter');
  var pw=document.getElementById('password');

  if(m==='register'){
    rf.classList.add('open');
    tabs.classList.add('register');
    document.getElementById('tabReg').classList.add('active');
    document.getElementById('tabLogin').classList.remove('active');
    sub.textContent='Create your workspace';
    footer.innerHTML='Already have an account? <a href="javascript:void(0)" onclick="setMode(\'login\')" style="color:var(--accent);border:none;font-weight:600;">Sign in</a>';
    pw.setAttribute('autocomplete','new-password');
    document.getElementById('pwStrength').classList.add('visible');
  } else {
    rf.classList.remove('open');
    tabs.classList.remove('register');
    document.getElementById('tabLogin').classList.add('active');
    document.getElementById('tabReg').classList.remove('active');
    sub.textContent='Sign in to your admin panel';
    footer.innerHTML='Don\'t have an account? <a href="javascript:void(0)" onclick="setMode(\'register\')" style="color:var(--accent);border:none;font-weight:600;">Sign up</a>';
    pw.setAttribute('autocomplete','current-password');
    document.getElementById('pwStrength').classList.remove('visible');
  }
}
setMode('login');

/* Password strength indicator */
document.getElementById('password').addEventListener('input',function(){
  if(mode!=='register') return;
  var pw=this.value;
  var bar=document.getElementById('pwBar');
  var score=0;
  if(pw.length>=8) score++;
  if(/[A-Z]/.test(pw)) score++;
  if(/[0-9]/.test(pw)) score++;
  if(/[^A-Za-z0-9]/.test(pw)) score++;
  var w=[0,25,50,75,100][score];
  var c=['var(--red)','#f59e0b','#eab308','var(--green)','var(--green)'][score];
  bar.style.width=w+'%';
  bar.style.background=c;
});

async function go(){
  var err=document.getElementById('err');err.textContent='';
  var btn=document.getElementById('submitBtn');
  var btnText=document.getElementById('btnText');
  var email=document.getElementById('email').value.trim();
  var password=document.getElementById('password').value;

  if(!email||!password){err.textContent='Please fill in all fields.';return;}
  if(password.length<8){err.textContent='Password must be at least 8 characters.';return;}

  btn.disabled=true;
  btnText.innerHTML='<span class="spinner"></span>';

  try{
    if(mode==='register'){
      var tenant_name=document.getElementById('tname').value.trim()||email.split('@')[0];
      var r=await fetch('/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password,tenant_name})});
      var data=await r.json();
      if(!r.ok) throw new Error(data.detail||'Registration failed');
      setToken(data.access_token,data.tenant_id);
    } else {
      var r=await fetch('/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
      var data=await r.json();
      if(!r.ok) throw new Error(data.detail||'Invalid credentials');
      setToken(data.access_token,data.tenant_id);
    }
    location.href='/admin';
  }catch(e){
    err.textContent=e.message;
    btn.disabled=false;
    btnText.textContent='Continue';
  }
}

document.getElementById('password').addEventListener('keydown',function(e){if(e.key==='Enter')go()});
document.getElementById('email').addEventListener('keydown',function(e){if(e.key==='Enter')go()});
document.getElementById('tname').addEventListener('keydown',function(e){if(e.key==='Enter')go()});
</script>
{% endblock %}
