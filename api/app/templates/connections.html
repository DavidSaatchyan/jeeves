{% extends "base.html" %}
{% block body %}
<h1>Connections</h1>
<p class="page-desc">Configure and manage third-party integrations. Each provider has its own tab.</p>

<div class="ch-tabs" id="providerTabs"></div>

<div id="providerPanels"></div>

{% endblock %}
{% block tail %}
<script>
var PROVIDERS = [
  {
    id: 'zoho',
    name: 'Zoho CRM',
    icon: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M7 7h10M7 12h8M7 17h6"/></svg>',
    color: '#2C5CC5',
    desc: 'BAA-compatible — Contacts & Appointments',
    fields: [
      { id: 'zo-client_id', cred_key: 'client_id', label: 'Client ID', placeholder: '1000.XXXXX', type: 'text' },
      { id: 'zo-client_secret', cred_key: 'client_secret', label: 'Client Secret', placeholder: '••••••••', type: 'password' },
      { id: 'zo-refresh_token', cred_key: 'refresh_token', label: 'Refresh Token', placeholder: '1000.XXXXX', type: 'password' },
      { id: 'zo-accounts_domain', cred_key: 'accounts_domain', label: 'Accounts Domain', placeholder: 'https://accounts.zoho.com', type: 'url' },
    ],
    whLabel: 'Webhook secret',
    whPlaceholder: 'Shared secret for Zoho webhook verification',
    events: ['Contacts.create', 'Contacts.edit', 'Appointments__s.create', 'Appointments__s.edit'],
    setupSteps: [
      'Create a Zoho API client in Zoho Developer Console with required scopes',
      'Generate a refresh token with aaaserver.profile.READ, Contacts.CREATE/UPDATE/READ scope',
      'Set up webhooks in Zoho for Contacts and Appointments modules',
    ],
    docUrl: 'https://www.zoho.com/crm/developer/docs/api/v7/',
    docLabel: 'Zoho API docs',
  },
  {
    id: 'hubspot',
    name: 'HubSpot',
    icon: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M9 10a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v4a1 1 0 0 1-1 1h-4a1 1 0 0 1-1-1v-4z"/></svg>',
    color: '#FF7A59',
    desc: 'Non-PHI marketing — contacts & meetings',
    fields: [
      { id: 'hs-access_token', cred_key: 'access_token', label: 'Private App Token', placeholder: 'pat-XXXXX', type: 'password' },
    ],
    whLabel: 'Webhook secret',
    whPlaceholder: 'HubSpot webhook secret (optional)',
    events: ['contact.creation', 'contact.deletion', 'meeting.created', 'meeting.deleted'],
    setupSteps: [
      'Create a HubSpot private app in your HubSpot account settings',
      'Add scopes: crm.objects.contacts.read/write, crm.objects.meetings.read/write',
      'Generate a private app access token and paste it above',
    ],
    docUrl: 'https://developers.hubspot.com/docs/api/private-apps',
    docLabel: 'HubSpot API docs',
  },
  {
    id: 'salesforce',
    name: 'Salesforce Health Cloud',
    icon: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-9-9"/><path d="M12 3v9h9"/></svg>',
    color: '#00A1E0',
    desc: 'BAA-compatible — Enterprise Health Cloud',
    fields: [
      { id: 'sf-instance_url', cred_key: 'instance_url', label: 'Instance URL', placeholder: 'https://your-instance.salesforce.com', type: 'url' },
      { id: 'sf-client_id', cred_key: 'client_id', label: 'Client ID', placeholder: 'Consumer key from Connected App', type: 'text' },
      { id: 'sf-client_secret', cred_key: 'client_secret', label: 'Client Secret', placeholder: '••••••••', type: 'password' },
      { id: 'sf-username', cred_key: 'username', label: 'Username', placeholder: 'admin@clinic.com', type: 'text' },
      { id: 'sf-password', cred_key: 'password', label: 'Password + Security Token', placeholder: '••••••••', type: 'password' },
    ],
    whLabel: 'Webhook secret',
    whPlaceholder: 'Salesforce Outbound Message secret',
    events: ['Patient.create', 'Patient.update', 'Appointment.create', 'Appointment.update'],
    setupSteps: [
      'Create a Connected App in Salesforce Setup',
      'Enable OAuth 2.0 with Client Credentials flow',
      'Assign the Health Cloud permission set to the integration user',
      'Set up Outbound Messages for Patient and Appointment objects',
    ],
    docUrl: 'https://developer.salesforce.com/docs/atlas.en-us.api_rest.meta/api_rest/',
    docLabel: 'Salesforce API docs',
  },
  {
    id: 'custom_api',
    name: 'Custom API',
    icon: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>',
    color: '#818cf8',
    desc: 'Generic REST connector — define your own endpoints',
    fields: [
      { id: 'ca-base_url', cred_key: 'base_url', label: 'API base URL', placeholder: 'https://api.example.com', type: 'url' },
      { id: 'ca-auth_type', cred_key: 'auth_type', label: 'Auth type', placeholder: 'bearer | basic | api_key', type: 'text' },
      { id: 'ca-auth_credentials', cred_key: 'auth_credentials', label: 'Auth credentials', placeholder: 'token or key', type: 'password' },
    ],
    whLabel: 'Webhook secret',
    whPlaceholder: 'Shared secret for webhook verification',
    events: ['*'],
    setupSteps: [
      'Configure your external system to send webhooks to the URL below',
      'Provide endpoint mapping in the JSON config field',
    ],
    docUrl: '',
    docLabel: 'API docs',
  }
];

var CRM_PROVIDERS = ['zoho', 'hubspot', 'salesforce', 'custom_api'];
function isCrmProvider(p) { return CRM_PROVIDERS.indexOf(p) !== -1; }

// ── Render provider tabs and panels ──────────────────────────
function renderProviders(data) {
  var connectors = data.native_connectors || [];
  var crmConnectors = data.crm_connections || [];
  var lookup = {};
  connectors.forEach(function(c){ lookup[c.provider] = c; });
  crmConnectors.forEach(function(c){ lookup[c.provider] = c; });

  // Tabs
  var tabsHtml = PROVIDERS.map(function(p, i){
    var info = lookup[p.id] || {};
    var connected = info.status === 'connected';
    return '<button class="ch-tab' + (i === 0 ? ' active' : '') + '" data-tab="' + p.id + '">' +
      '<span class="ch-tab-icon">' + p.icon + '</span>' +
      p.name +
      '<span class="pill ' + (connected ? 'ok' : 'muted') + '" style="font-size:9px;margin-left:4px;padding:1px 6px">' +
        (connected ? '✓' : '—') +
      '</span></button>';
  }).join('');
  document.getElementById('providerTabs').innerHTML = tabsHtml;

  // Panels
  var panelsHtml = PROVIDERS.map(function(p, i){
    var info = lookup[p.id] || {};
    var connected = info.status === 'connected';
    var whSecret = info.has_webhook_secret;
    var whUrl = info.webhook_url || '';

    var fieldsHtml = p.fields.map(function(f){
      return '<div class="field-row"><label>' + f.label + '</label><input id="' + f.id + '" type="' + f.type + '" placeholder="' + f.placeholder + '"></div>';
    }).join('');

    var eventsHtml = p.events.map(function(ev){
      return '<code>' + esc(ev) + '</code>';
    }).join('');

    var stepsHtml = p.setupSteps.map(function(s, si){
      return '<div class="step"><div class="step-num">' + (si + 1) + '</div><div class="step-content">' + esc(s) + '</div></div>';
    }).join('');

    return '<div class="ch-panel' + (i === 0 ? ' active' : '') + '" id="panel-' + p.id + '">' +
      '<div class="ch-header">' +
        '<div class="flex" style="gap:12px;align-items:center">' +
          '<div class="ch-logo" style="background:rgba(' + hexToRgb(p.color) + ',0.12);color:' + p.color + '">' + p.icon + '</div>' +
          '<div><div class="ch-name">' + p.name + '</div><div class="ch-desc">' + p.desc + '</div></div>' +
          '<div class="ch-status"><span class="pill ' + (connected ? 'ok' : 'muted') + '" id="badge-' + p.id + '">' + (connected ? 'Connected' : 'Disconnected') + '</span></div>' +
        '</div>' +
      '</div>' +

      '<div class="ch-body">' +

        // Credentials
        '<div class="ch-card"><h3>API Credentials</h3>' + fieldsHtml + '</div>' +

        // Webhook configuration
        '<div class="ch-card"><h3>Webhook Configuration</h3>' +

          '<div class="field-row"><label>' + p.whLabel + '</label>' +
          '<input id="wh-' + p.id + '" type="password" placeholder="' + p.whPlaceholder + '"' +
            (whSecret ? ' value="••••••••"' : '') + '></div>' +

          (whUrl ? '<div class="whurl-box"><label>Webhook URL</label><div class="whurl-copy"><code id="whurl-' + p.id + '">' + esc(whUrl) + '</code><button class="ghost sm" onclick="copyWhUrl(\'' + p.id + '\')">📋</button></div></div>' : '') +

          '<details class="wh-events" ' + (connected ? 'open' : '') + '>' +
            '<summary class="wh-events-summary">Subscribed events (' + p.events.length + ')</summary>' +
            '<div class="wh-events-list">' + eventsHtml + '</div>' +
          '</details>' +

          '<div class="wh-instructions"><h4>Setup instructions</h4>' + stepsHtml + '</div>' +
          '<a href="' + p.docUrl + '" target="_blank" class="doc-link">📖 ' + esc(p.docLabel) + '</a>' +

        '</div>' +

        // Actions
        '<div class="ch-actions">' +
          '<button onclick="connectProvider(\'' + p.id + '\')" id="conn-' + p.id + '" class="accent">' + (connected ? 'Update' : 'Connect') + '</button>' +
          '<button onclick="testProvider(\'' + p.id + '\')" id="test-' + p.id + '" class="ghost" ' + (connected ? '' : 'disabled') + '>Test connection</button>' +
          '<button onclick="syncProvider(\'' + p.id + '\')" id="sync-' + p.id + '" class="ghost" ' + (connected ? '' : 'style="display:none"') + '>Sync Now</button>' +
          '<button onclick="disconnectProvider(\'' + p.id + '\')" id="disc-' + p.id + '" class="ghost danger" ' + (connected ? '' : 'style="display:none"') + '>Disconnect</button>' +
          '<span class="whstatus-badge" id="whstatus-' + p.id + '">' +
            (connected ? '<span class="pill ok" style="font-size:9px">Connected</span>' : '') +
            (whSecret ? '<span class="pill ok" style="font-size:9px;margin-left:4px">Webhook ✓</span>' : (connected ? '<span class="pill warn" style="font-size:9px;margin-left:4px">No webhook secret</span>' : '')) +
          '</span>' +
        '</div>' +
        '<div class="err-msg" id="msg-' + p.id + '"></div>' +
      '</div>' +
    '</div>';
  }).join('');
  document.getElementById('providerPanels').innerHTML = panelsHtml;
}

function hexToRgb(h){
  var r = parseInt(h.slice(1,3),16), g = parseInt(h.slice(3,5),16), b = parseInt(h.slice(5,7),16);
  return r + ',' + g + ',' + b;
}

// ── Tab switching ────────────────────────────────────────────
document.addEventListener('click', function(e){
  var tab = e.target.closest('.ch-tab');
  if(!tab) return;
  document.querySelectorAll('.ch-tab').forEach(function(t){ t.classList.remove('active'); });
  tab.classList.add('active');
  document.querySelectorAll('.ch-panel').forEach(function(p){ p.classList.remove('active'); });
  var panel = document.getElementById('panel-' + tab.dataset.tab);
  if(panel) panel.classList.add('active');
});

// ── Connect / Test / Disconnect ──────────────────────────────
function showMsg(p, text, type){
  var el = document.getElementById('msg-'+p);
  if(!el) return;
  el.textContent = text;
  el.className = 'err-msg';
  if(type==='ok'){ el.style.color='var(--green)'; setTimeout(function(){ el.textContent=''; }, 3000); }
  else { el.style.color='var(--red)'; }
}

function getCreds(p){
  var provider = PROVIDERS.find(function(x){ return x.id === p; });
  if(!provider) return {};
  var creds = {};
  provider.fields.forEach(function(f){
    var el = document.getElementById(f.id);
    if(el && el.value) creds[f.cred_key] = el.value;
  });
  return creds;
}

function getWhSecret(p){
  var el = document.getElementById('wh-'+p);
  if(!el) return '';
  if(el.value === '••••••••') return '';
  return el.value.trim();
}

function validateProvider(p, creds){
  var provider = PROVIDERS.find(function(x){ return x.id === p; });
  if(!provider) return 'Unknown provider';
  var missing = [];
  provider.fields.forEach(function(f){
    var el = document.getElementById(f.id);
    if(!el || !el.value) missing.push(f.label);
  });
  return missing.length ? 'Required: ' + missing.join(', ') : '';
}

function connectProvider(p){
  var creds = getCreds(p);
  var err = validateProvider(p, creds);
  if(err){ showMsg(p, err); return; }

  showMsg(p, 'Connecting…');
  var body = { provider: p };
  if(isCrmProvider(p)){ body.config = creds; }
  else { body.credentials = creds; }
  var wh = getWhSecret(p);
  if(wh) body.webhook_secret = wh;

  var path = isCrmProvider(p) ? '/crm' : '/integrations/native';
  api(path, {method:'POST', body:body})
    .then(function(){ showMsg(p, 'Connected ✓', 'ok'); loadProviders(); })
    .catch(function(e){ showMsg(p, e.message); });
}

function testProvider(p){
  showMsg(p, 'Testing…');
  var path = (isCrmProvider(p) ? '/crm/' : '/integrations/native/') + p + '/test';
  api(path, {method:'POST'})
    .then(function(d){ showMsg(p, d.ok ? 'Test passed ✓' : 'Failed', d.ok?'ok':''); })
    .catch(function(e){ showMsg(p, e.message); });
}

function syncProvider(p){
  showMsg(p, 'Syncing…');
  var path = (isCrmProvider(p) ? '/crm/' : '/integrations/native/') + p + '/sync';
  api(path, {method:'POST'})
    .then(function(d){ showMsg(p, d.ok ? 'Sync complete ✓' : 'Sync failed', d.ok?'ok':''); })
    .catch(function(e){ showMsg(p, e.message); });
}

function disconnectProvider(p){
  if(!confirm('Disconnect '+p+'? This will stop all related workflows.')) return;
  var path = (isCrmProvider(p) ? '/crm/' : '/integrations/native/') + p;
  api(path, {method:'DELETE'})
    .then(function(){ showMsg(p, 'Disconnected', 'ok'); loadProviders(); })
    .catch(function(e){ showMsg(p, e.message); });
}

function copyWhUrl(p){
  var el = document.getElementById('whurl-'+p);
  if(!el) return;
  var url = el.textContent || '';
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(url).then(function(){ showMsg(p, 'URL copied ✓', 'ok'); });
  } else {
    var ta = document.createElement('textarea');
    ta.value = url;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showMsg(p, 'URL copied ✓', 'ok');
  }
}

function loadProviders(){
  api('/admin/api/integrations').then(function(data){
    renderProviders(data);
  }).catch(function(){});
}

loadProviders();
</script>

<style>
.ch-panel { display:none; }
.ch-panel.active { display:block; animation:fadeIn .15s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }

.ch-header { background:rgba(255,255,255,0.02); border:1px solid var(--border); border-radius:var(--radius); padding:20px; margin-bottom:16px; }
.ch-header:hover { border-color:var(--border-bright); background:rgba(255,255,255,0.03); }
.ch-logo { width:44px; height:44px; border-radius:10px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.ch-name { font-size:18px; font-weight:700; }
.ch-desc { font-size:13px; color:var(--muted); margin-top:3px; }
.ch-status { margin-left:auto; }

.ch-body { display:flex; flex-direction:column; gap:14px; }
.ch-card { background:rgba(255,255,255,0.02); border:1px solid var(--border); border-radius:var(--radius); padding:20px; }
.ch-card:hover { border-color:var(--border-bright); }
.ch-card h3 { font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; color:var(--muted2); margin-bottom:16px; }

.field-row { margin-bottom:12px; }
.field-row:last-child { margin-bottom:0; }
.field-row label { display:block; font-size:12px; font-weight:600; color:var(--muted2); margin-bottom:4px; }
.field-row input { width:100%; padding:10px 14px; background:var(--bg); color:var(--text); border:1px solid var(--border); border-radius:6px; outline:none; font-family:inherit; font-size:14px; transition:border-color .1s; }
.field-row input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(94,106,210,0.25); }

.whurl-box { margin-bottom:12px; }
.whurl-box label { display:block; font-size:12px; font-weight:600; color:var(--muted2); margin-bottom:4px; }
.whurl-copy { display:flex; align-items:center; gap:6px; background:var(--bg); border:1px solid var(--border); border-radius:6px; padding:8px 12px; }
.whurl-copy code { flex:1; font-size:13px; color:var(--accent); word-break:break-all; }
.whurl-copy button { padding:5px 10px; font-size:12px; }

.wh-events { font-size:13px; margin-bottom:12px; }
.wh-events-summary { cursor:pointer; color:var(--muted2); padding:4px 0; font-weight:600; }
.wh-events-list { display:flex; flex-wrap:wrap; gap:6px; margin-top:6px; }
.wh-events-list code { font-size:11px; padding:3px 8px; background:var(--surface); border:1px solid var(--border); border-radius:5px; color:var(--muted); }

.wh-instructions { margin-bottom:12px; }
.wh-instructions h4 { font-size:12px; font-weight:700; color:var(--muted2); margin-bottom:8px; }
.wh-instructions .step { display:flex; gap:10px; margin-bottom:8px; align-items:flex-start; }
.wh-instructions .step:last-child { margin-bottom:0; }
.wh-instructions .step-num { width:22px; height:22px; border-radius:var(--radius-sm); background:#fff; color:var(--bg); display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; flex-shrink:0; }
.wh-instructions .step-content { font-size:13px; color:var(--muted); }

.doc-link { display:inline-flex; align-items:center; gap:6px; font-size:13px; color:var(--accent); border:none; margin-top:6px; }
.doc-link:hover { color:#fff; }

.ch-actions { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
.whstatus-badge { margin-left:auto; }
</style>
{% endblock %}
