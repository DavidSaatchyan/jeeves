<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Jeeves Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #030508;
      --surface: #0a0f1e;
      --surface2: #0e1428;
      --border: rgba(255,255,255,0.10);
      --border-bright: rgba(255,255,255,0.15);
      --accent: #6366f1;
      --accent2: #8b5cf6;
      --accent3: #06b6d4;
      --green: #10b981;
      --red: #f87171;
      --amber: #f59e0b;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --muted2: #64748b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); display: flex; min-height: 100vh; font-size: 14px; line-height: 1.6; }

    /* ── SIDEBAR ── */
    aside { width: 220px; flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border); padding: 0; position: sticky; top: 0; height: 100vh; overflow-y: auto; display: flex; flex-direction: column; }
    aside .brand { padding: 16px 18px 12px; border-bottom: 1px solid var(--border); }
    aside .brand h1 { font-size: 18px; font-weight: 800; letter-spacing: -.5px; color: var(--text); }
    aside .brand h1 span { color: var(--accent); }
    aside .brand .brand-sub { font-size: 9px; color: var(--muted2); margin-top: 1px; letter-spacing: 1px; text-transform: uppercase; }

    aside nav { padding: 10px 8px; flex: 1; }
    aside .nav-group { margin-bottom: 14px; }
    aside .nav-label { font-size: 9px; font-weight: 700; color: var(--muted2); text-transform: uppercase; letter-spacing: 1.2px; padding: 0 10px; margin-bottom: 4px; }
    aside .nav-link { display: flex; align-items: center; padding: 7px 10px; color: var(--muted); text-decoration: none; font-size: 12.5px; font-weight: 500; border-radius: 6px; transition: all .15s; gap: 8px; }
    aside .nav-link:hover { background: rgba(99,102,241,0.08); color: var(--text); }
    aside .nav-link.active { background: rgba(99,102,241,0.12); color: var(--text); }
    aside .nav-link .nav-icon { width: 16px; height: 16px; flex-shrink: 0; opacity: 0.5; }
    aside .nav-link.active .nav-icon { opacity: 0.8; }

    aside .sidebar-footer { padding: 10px 8px; border-top: 1px solid var(--border); }
    aside .sidebar-footer a { display: flex; align-items: center; gap: 8px; padding: 7px 10px; color: var(--muted); text-decoration: none; font-size: 12.5px; border-radius: 6px; transition: all .15s; }
    aside .sidebar-footer a:hover { background: rgba(248,113,113,0.06); color: var(--red); }

    /* ── MAIN ── */
    main { flex: 1; padding: 32px 40px 80px; max-width: 1200px; }
    @media (max-width: 768px) { body { flex-direction: column; } aside { width: 100%; height: auto; position: static; } main { padding: 20px 16px; } }

    /* ── TYPOGRAPHY ── */
    h1 { font-size: 24px; font-weight: 800; letter-spacing: -.5px; margin-bottom: 8px; }
    h2 { font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); margin-bottom: 16px; }
    .page-desc { color: var(--muted); font-size: 14px; margin-bottom: 32px; max-width: 600px; }

    /* ── CARDS ── */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 24px; margin-bottom: 20px; }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .card-header h2 { margin-bottom: 0; }

    /* ── FORMS ── */
    label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin-top: 14px; margin-bottom: 6px; letter-spacing: .3px; }
    label:first-child { margin-top: 0; }
    input[type="text"], input[type="email"], input[type="password"], input[type="number"], input[type="url"], textarea, select {
      width: 100%; padding: 10px 14px; background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 10px; outline: none; font-family: inherit; font-size: 13px; transition: border-color .2s;
    }
    input:focus, textarea:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(99,102,241,0.1); }
    textarea { min-height: 80px; font-family: 'SF Mono', ui-monospace, Consolas, monospace; font-size: 12px; resize: vertical; }
    select { cursor: pointer; }

    /* ── BUTTONS ── */
    button, .btn { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; border: none; border-radius: 10px; padding: 10px 16px; cursor: pointer; font-family: inherit; font-size: 13px; font-weight: 600; transition: all .25s; display: inline-flex; align-items: center; gap: 6px; }
    button:hover, .btn:hover { box-shadow: 0 8px 24px rgba(99,102,241,0.3); transform: translateY(-1px); }
    button:disabled { opacity: .5; cursor: default; transform: none; box-shadow: none; }
    button.ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); box-shadow: none; }
    button.ghost:hover { background: rgba(255,255,255,0.04); border-color: var(--border-bright); color: var(--text); box-shadow: none; transform: none; }
    button.ghost.danger { color: var(--red); }
    button.ghost.danger:hover { background: rgba(248,113,113,0.06); border-color: rgba(248,113,113,0.2); }
    button.sm { padding: 6px 12px; font-size: 12px; border-radius: 8px; }

    /* ── TABLES ── */
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { padding: 10px 14px; text-align: left; font-weight: 600; color: var(--muted2); font-size: 11px; text-transform: uppercase; letter-spacing: .5px; border-bottom: 1px solid var(--border); }
    td { padding: 12px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(99,102,241,0.03); }

    /* ── BADGES / PILLS ── */
    .pill { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 600; }
    .pill.ok { color: var(--green); background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.2); }
    .pill.err { color: var(--red); background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.2); }
    .pill.warn { color: var(--amber); background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.2); }
    .pill.muted { color: var(--muted2); background: rgba(255,255,255,0.04); border: 1px solid var(--border); }

    /* ── STAT CARDS ── */
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 14px; margin-bottom: 24px; }
    .stat { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 20px; transition: all .3s; }
    .stat:hover { border-color: rgba(99,102,241,0.2); }
    .stat .n { font-size: 32px; font-weight: 800; letter-spacing: -1px; color: var(--text); }
    .stat .l { color: var(--muted); font-size: 12px; margin-top: 4px; font-weight: 500; }

    /* ── HELP BOX ── */
    .help { background: rgba(99,102,241,0.04); border: 1px solid rgba(99,102,241,0.15); border-left: 3px solid var(--accent); padding: 16px 18px; border-radius: 0 12px 12px 0; margin-bottom: 20px; font-size: 13px; line-height: 1.6; }
    .help h3 { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
    .help p { color: var(--muted); margin: 4px 0; }
    .help p strong { color: var(--text); }
    .help code { background: var(--bg); padding: 2px 6px; border-radius: 4px; font-size: 12px; font-family: 'SF Mono', ui-monospace, Consolas, monospace; color: #c7d2fe; }

    /* ── DROP ZONE ── */
    .drop { border: 2px dashed var(--border); border-radius: 12px; padding: 32px; text-align: center; color: var(--muted); cursor: pointer; transition: all .2s; }
    .drop:hover, .drop.hot { border-color: var(--accent); background: rgba(99,102,241,0.04); color: var(--text); }

    /* ── LAYOUT ── */
    .grid { display: grid; gap: 16px; }
    .grid-2 { grid-template-columns: 1fr 1fr; }
    .grid-3 { grid-template-columns: 1fr 1fr 1fr; }
    .flex { display: flex; gap: 10px; align-items: center; }
    .flex-wrap { flex-wrap: wrap; }
    .gap-sm { gap: 6px; }
    .mt-12 { margin-top: 12px; }
    .mt-16 { margin-top: 16px; }
    .mt-20 { margin-top: 20px; }
    .mb-16 { margin-bottom: 16px; }

    /* ── MISC ── */
    .muted { color: var(--muted); font-size: 12px; }
    .err-msg { color: var(--red); font-size: 13px; margin-top: 8px; }
    code, pre { font-family: 'SF Mono', ui-monospace, Consolas, monospace; font-size: 12px; }
    pre { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 14px; overflow: auto; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { color: #a5b4fc; }
    .divider { height: 1px; background: var(--border); margin: 20px 0; }
    .empty-state { text-align: center; padding: 40px 20px; color: var(--muted2); }

    /* ── STEP LIST ── */
    .step { display: flex; gap: 14px; margin-bottom: 16px; align-items: flex-start; }
    .step:last-child { margin-bottom: 0; }
    .step-num { width: 28px; height: 28px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; margin-top: 1px; }
    .step-content strong { color: var(--text); font-size: 14px; }
    .step-content .muted { margin-top: 2px; }

    /* ── SECTION TOGGLE ── */
    .section-toggle { cursor: pointer; display: flex; justify-content: space-between; align-items: center; padding: 4px 0; }
    .section-toggle:hover h2 { color: var(--text); }
    .section-arrow { font-size: 16px; color: var(--muted2); transition: transform .2s; }
    .section-arrow.open { transform: rotate(180deg); }

    /* ── MODAL ── */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 1000; overflow-y: auto; backdrop-filter: blur(4px); }
    .modal-overlay.show { display: flex; align-items: flex-start; justify-content: center; padding-top: 60px; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; width: 100%; max-width: 600px; padding: 28px; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .modal-header h2 { margin: 0; font-size: 16px; text-transform: none; letter-spacing: 0; color: var(--text); }

    /* ── ACTIVE STATES (used by channels, integrations) ── */
    .ecom-card.active{border-color:var(--accent)!important;background:rgba(99,102,241,0.04)!important}
    .ecom-card:hover{border-color:rgba(99,102,241,0.3)}
    .crm-tab.active{background:var(--accent)!important;color:#fff!important;border-color:var(--accent)!important;box-shadow:0 4px 12px rgba(99,102,241,0.2)}
    button:not(.ghost):not([disabled]):active{transform:translateY(0);box-shadow:0 2px 8px rgba(99,102,241,0.2)}
  </style>
</head>
<body>

{% block body %}{% endblock %}

<script>
// Sidebar active state
(function(){
  var p = location.pathname.replace(/\/$/, '') || '/admin';
  document.querySelectorAll('aside a.nav-link[data-path]').forEach(function(a){
    if(a.getAttribute('data-path')===p) a.classList.add('active');
  });
})();
</script>
<script>
function token(){ return localStorage.getItem('jeeves_token'); }
function setToken(t,tid){ localStorage.setItem('jeeves_token',t); if(tid) localStorage.setItem('jeeves_tid',tid); }
function tenantId(){ return localStorage.getItem('jeeves_tid'); }
function logout(){ localStorage.removeItem('jeeves_token'); localStorage.removeItem('jeeves_tid'); location.href='/'; }
async function api(path, opts={}){
  const headers = opts.headers||{};
  if(!(opts.body instanceof FormData)) headers['Content-Type']='application/json';
  const t = token(); if(t) headers['Authorization']='Bearer '+t;
  const r = await fetch(path,{...opts,headers,body: opts.body && !(opts.body instanceof FormData) ? JSON.stringify(opts.body):opts.body});
  if(r.status===401){ location.href='/admin/login'; throw new Error('unauth'); }
  if(r.status===402){ location.href='/admin/billing'; }
  const ct=r.headers.get('content-type')||''; const data = ct.includes('json')?await r.json():await r.text();
  if(!r.ok) throw new Error(typeof data==='string'?data:JSON.stringify(data));
  return data;
}
if(!token() && !location.pathname.endsWith('/login')){ location.href='/admin/login'; }
</script>
{% block tail %}{% endblock %}
</body>
</html>
