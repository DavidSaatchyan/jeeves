<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Jeeves — AI Communication Platform</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/tokens.css">
  <link rel="stylesheet" href="/static/css/base.css">
  <link rel="stylesheet" href="/static/css/components.css">
  {% block head %}{% endblock %}
</head>
<body>
<a href="#main-content" class="skip-link">Skip to main content</a>
<script>
function token(){ return localStorage.getItem('jeeves_token'); }
function refreshToken(){ return localStorage.getItem('jeeves_refresh')||cookieValue('jeeves_refresh'); }
function cookieValue(n){ const m=document.cookie.match(new RegExp('(?:^|; )'+n+'=([^;]*)')); return m?decodeURIComponent(m[1]):null; }
function setToken(t,tid){ localStorage.setItem('jeeves_token',t); if(tid) localStorage.setItem('jeeves_tid',tid); }
function tenantId(){ return localStorage.getItem('jeeves_tid'); }
function logout(){ localStorage.removeItem('jeeves_token'); localStorage.removeItem('jeeves_tid'); localStorage.removeItem('jeeves_refresh'); location.href='/'; }
async function api(path, opts={}){
  const headers = opts.headers||{};
  if(!(opts.body instanceof FormData)) headers['Content-Type']='application/json';
  const t = token(); if(t) headers['Authorization']='Bearer '+t;
  let r = await fetch(path,{...opts,headers,credentials:'include',body: opts.body && !(opts.body instanceof FormData) ? JSON.stringify(opts.body):opts.body});
  if(r.status===204) return null;
  if(r.status===401){
    const rt = refreshToken();
    if(rt){
      try{
        const rr = await fetch('/auth/refresh',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({refresh_token:rt})});
        if(rr.ok){
          const rd = await rr.json();
          setToken(rd.access_token);
          localStorage.setItem('jeeves_refresh',rd.refresh_token);
          headers['Authorization']='Bearer '+rd.access_token;
          r = await fetch(path,{...opts,headers,credentials:'include',body: opts.body && !(opts.body instanceof FormData) ? JSON.stringify(opts.body):opts.body});
          if(r.status===204) return null;
          if(r.status===402){ location.href='/admin/settings/billing'; }
          const ct=r.headers.get('content-type')||''; const data = ct.includes('json')?await r.json():await r.text();
          if(!r.ok) throw new Error(typeof data==='string'?data:JSON.stringify(data));
          return data;
        }
      }catch(_){}
    }
    location.href='/admin/login'; throw new Error('unauth');
  }
  if(r.status===402){ location.href='/admin/settings/billing'; }
  const ct=r.headers.get('content-type')||''; const data = ct.includes('json')?await r.json():await r.text();
  if(!r.ok) throw new Error(typeof data==='string'?data:JSON.stringify(data));
  return data;
}
function esc(v){ return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function lockScroll(){ var sw=window.innerWidth-document.documentElement.clientWidth; document.body.style.overflow='hidden'; document.body.style.paddingRight=sw+'px'; }
function unlockScroll(){ document.body.style.overflow=''; document.body.style.paddingRight=''; }
if(!token() && !location.pathname.endsWith('/login')){ location.href='/admin/login'; }
</script>
<aside>
  <div class="brand">
    <div class="brand-top">
      <img src="/static/logo.svg" alt="Jeeves" class="brand-logo" width="40" height="40"/>
      <div class="brand-info">
        <span class="brand-name">Jeeves</span>
        <div class="brand-sub">AI Communication Platform</div>
      </div>
    </div>
  </div>

  <nav>
    <a href="/admin/dashboard" class="nav-link" data-path="/admin/dashboard">
      <svg class="nav-icon" width="16" height="16"><use href="/static/svg/symbol-defs.svg#dashboard"/></svg>
      Dashboard
    </a>

    <a href="/admin/inbox" class="nav-link" data-path="/admin/inbox">
      <svg class="nav-icon" width="16" height="16"><use href="/static/svg/symbol-defs.svg#inbox"/></svg>
      Inbox
    </a>

    <a href="/admin/agents" class="nav-link" data-path="/admin/agents">
      <svg class="nav-icon" width="16" height="16"><use href="/static/svg/symbol-defs.svg#agents"/></svg>
      Agents
    </a>

    <a href="/admin/knowledge" class="nav-link" data-path="/admin/knowledge">
      <svg class="nav-icon" width="16" height="16"><use href="/static/svg/symbol-defs.svg#knowledge"/></svg>
      Knowledge
    </a>

    <a href="/admin/integrations" class="nav-link" data-path="/admin/integrations">
      <svg class="nav-icon" width="16" height="16"><use href="/static/svg/symbol-defs.svg#integrations"/></svg>
      Integrations
    </a>

    <div class="nav-section">
      <div class="nav-section-title">Settings</div>

      <a href="/admin/settings/team" class="nav-link sub" data-path="/admin/settings/team" data-role="owner">
        <span class="nav-agent-icon" style="background:var(--surface2);color:var(--muted2)">
          <svg class="nav-icon" width="16" height="16"><use href="/static/svg/symbol-defs.svg#team"/></svg>
        </span>
        <span class="nav-link-text">Team</span>
      </a>
      <a href="/admin/settings/billing" class="nav-link sub" data-path="/admin/settings/billing" data-role="owner">
        <span class="nav-agent-icon" style="background:var(--surface2);color:var(--muted2)">
          <svg class="nav-icon" width="16" height="16"><use href="/static/svg/symbol-defs.svg#billing"/></svg>
        </span>
        <span class="nav-link-text">Billing</span>
      </a>
      <a href="/admin/settings/logs" class="nav-link sub" data-path="/admin/settings/logs" data-role="owner,manager">
        <span class="nav-agent-icon" style="background:var(--surface2);color:var(--muted2)">
          <svg class="nav-icon" width="16" height="16"><use href="/static/svg/symbol-defs.svg#logs"/></svg>
        </span>
        <span class="nav-link-text">Activity Logs</span>
      </a>

    </div>
  </nav>

  <div class="sidebar-footer">
    <a href="#" onclick="logout();return false">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><use href="/static/svg/symbol-defs.svg#logout"/></svg>
      Sign out
    </a>
  </div>
</aside>

<main id="main-content">
{% block body %}{% endblock %}
</main>

<script>
(function(){
  var p = location.pathname.replace(/\/$/, '') || '/admin';
  document.querySelectorAll('aside a.nav-link[data-path]').forEach(function(a){
    if(a.getAttribute('data-path')===p) a.classList.add('active');
  });

  // Role-based sidebar filtering
  var role = '{{ tenant_role }}' || 'owner';
  document.querySelectorAll('aside a.nav-link[data-role]').forEach(function(a){
    var allowed = (a.getAttribute('data-role') || '').split(',');
    if(allowed.indexOf(role) === -1) a.style.display = 'none';
  });
})();
</script>
{% block tail %}{% endblock %}
</body>
</html>
