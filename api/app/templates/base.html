<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Jeeves — AI Communication Platform</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/tokens.css">
  <link rel="stylesheet" href="/static/css/base.css">
  <link rel="stylesheet" href="/static/css/components.css">
  {% block head %}{% endblock %}
</head>
<body>
<script>
function token(){ return localStorage.getItem('jeeves_token'); }
function refreshToken(){ return localStorage.getItem('jeeves_refresh')||cookieValue('jeeves_refresh'); }
function cookieValue(n){ const m=document.cookie.match(new RegExp('(?:^|; )'+n+'=([^;]*)')); return m?decodeURIComponent(m[1]):null; }
function setToken(t,tid){ localStorage.setItem('jeeves_token',t); if(tid) localStorage.setItem('jeeves_tid',tid); }
function tenantId(){ return localStorage.getItem('jeeves_tid'); }
function logout(){ localStorage.removeItem('jeeves_token'); localStorage.removeItem('jeeves_tid'); localStorage.removeItem('jeeves_refresh'); location.href='/'; }
async function api(path, opts={}){
  const headers = opts.headers||{};
  if(!(opts.body instanceof FormData)) headers['Content-Type']='application/json';
  const t = token(); if(t) headers['Authorization']='Bearer '+t;
  let r = await fetch(path,{...opts,headers,credentials:'include',body: opts.body && !(opts.body instanceof FormData) ? JSON.stringify(opts.body):opts.body});
  if(r.status===204) return null;
  if(r.status===401){
    const rt = refreshToken();
    if(rt){
      try{
        const rr = await fetch('/auth/refresh',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({refresh_token:rt})});
        if(rr.ok){
          const rd = await rr.json();
          setToken(rd.access_token);
          localStorage.setItem('jeeves_refresh',rd.refresh_token);
          headers['Authorization']='Bearer '+rd.access_token;
          r = await fetch(path,{...opts,headers,credentials:'include',body: opts.body && !(opts.body instanceof FormData) ? JSON.stringify(opts.body):opts.body});
          if(r.status===204) return null;
          if(r.status===402){ location.href='/admin/settings/billing'; }
          const ct=r.headers.get('content-type')||''; const data = ct.includes('json')?await r.json():await r.text();
          if(!r.ok) throw new Error(typeof data==='string'?data:JSON.stringify(data));
          return data;
        }
      }catch(_){}
    }
    location.href='/admin/login'; throw new Error('unauth');
  }
  if(r.status===402){ location.href='/admin/settings/billing'; }
  const ct=r.headers.get('content-type')||''; const data = ct.includes('json')?await r.json():await r.text();
  if(!r.ok) throw new Error(typeof data==='string'?data:JSON.stringify(data));
  return data;
}
function esc(v){ return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function lockScroll(){ var sw=window.innerWidth-document.documentElement.clientWidth; document.body.style.overflow='hidden'; document.body.style.paddingRight=sw+'px'; }
function unlockScroll(){ document.body.style.overflow=''; document.body.style.paddingRight=''; }
if(!token() && !location.pathname.endsWith('/login')){ location.href='/admin/login'; }
</script>
<aside>
  <div class="brand">
    <div class="brand-top">
      <img src="/static/logo.svg" alt="Jeeves" class="brand-logo" width="40" height="40"/>
      <div class="brand-info">
        <span class="brand-name">Jeeves</span>
        <div class="brand-sub">AI Communication Platform</div>
      </div>
    </div>
  </div>

  <nav>
    <a href="/admin/dashboard" class="nav-link" data-path="/admin/dashboard">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      Dashboard
    </a>

    <a href="/admin/inbox" class="nav-link" data-path="/admin/inbox">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg>
      Inbox
    </a>

    <a href="/admin/agents" class="nav-link" data-path="/admin/agents">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="10" rx="2"/><circle cx="12" cy="5" r="2"/><path d="M12 7v4"/><circle cx="9" cy="15" r="1" fill="currentColor"/><circle cx="15" cy="15" r="1" fill="currentColor"/></svg>
      Agents
    </a>

    <a href="/admin/knowledge" class="nav-link" data-path="/admin/knowledge">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      Knowledge
    </a>

    <a href="/admin/integrations" class="nav-link" data-path="/admin/integrations">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
      Integrations
    </a>

    <div class="nav-section">
      <div class="nav-section-title">Settings</div>

      <a href="/admin/settings/team" class="nav-link sub" data-path="/admin/settings/team" data-role="owner">
        <span class="nav-agent-icon" style="background:var(--surface2);color:var(--muted2)">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        </span>
        <span class="nav-link-text">Team</span>
      </a>
      <a href="/admin/settings/billing" class="nav-link sub" data-path="/admin/settings/billing" data-role="owner">
        <span class="nav-agent-icon" style="background:var(--surface2);color:var(--muted2)">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
        </span>
        <span class="nav-link-text">Billing</span>
      </a>
      <a href="/admin/settings/logs" class="nav-link sub" data-path="/admin/settings/logs" data-role="owner,manager">
        <span class="nav-agent-icon" style="background:var(--surface2);color:var(--muted2)">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        </span>
        <span class="nav-link-text">Activity Logs</span>
      </a>

    </div>
  </nav>

  <div class="sidebar-footer">
    <a href="#" onclick="logout();return false">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Sign out
    </a>
  </div>
</aside>

<main>
{% block body %}{% endblock %}
</main>

<script>
(function(){
  var p = location.pathname.replace(/\/$/, '') || '/admin';
  document.querySelectorAll('aside a.nav-link[data-path]').forEach(function(a){
    if(a.getAttribute('data-path')===p) a.classList.add('active');
  });

  // Role-based sidebar filtering
  var role = '{{ tenant_role }}' || 'owner';
  document.querySelectorAll('aside a.nav-link[data-role]').forEach(function(a){
    var allowed = (a.getAttribute('data-role') || '').split(',');
    if(allowed.indexOf(role) === -1) a.style.display = 'none';
  });
})();
</script>
{% block tail %}{% endblock %}
</body>
</html>
