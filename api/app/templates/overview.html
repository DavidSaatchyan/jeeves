{% extends "base.html" %}
{% block body %}

<!-- Hero KPI -->
<div class="hero-kpi">
  <div class="hero-kpi-main">
    <span class="hero-kpi-value" id="kpiRevenue">$0</span>
    <span class="hero-kpi-label">Revenue recovered</span>
  </div>
  <div class="hero-kpi-supp">
    <div class="hero-kpi-stat">
      <span class="hero-kpi-stat-value" id="kpiSaveRate">0%</span>
      <span class="hero-kpi-stat-label">Success rate</span>
    </div>
    <div class="hero-kpi-stat">
      <span class="hero-kpi-stat-value" id="kpiActive">0</span>
      <span class="hero-kpi-stat-label">Active</span>
    </div>
    <div class="hero-kpi-stat">
      <span class="hero-kpi-stat-value" id="kpiAttention">0</span>
      <span class="hero-kpi-stat-label">Needs attention</span>
    </div>
  </div>
</div>

<div class="grid grid-2">
  <!-- Attention Queue -->
  <div class="card">
    <div class="card-header">
      <h2>Attention</h2>
      <span class="muted2" id="attentionCount" style="font-size:12px">0 items</span>
    </div>
    <div id="attentionQueue" class="muted" style="padding:4px 0;font-size:13px">Loading...</div>
  </div>

  <!-- Live Activity -->
  <div class="card">
    <div class="card-header">
      <h2>Activity</h2>
    </div>
    <div id="liveFeed" class="muted" style="padding:4px 0;font-size:13px">Loading...</div>
  </div>
</div>

<!-- Health -->
<div class="card">
  <h2>Health</h2>
  <div id="healthBlocks" style="padding:4px 0">
    <div class="health-grid">
      <div class="health-item">
        <span class="health-dot green"></span>
        <span class="health-name">Recovery</span>
        <span class="health-status ok">healthy</span>
      </div>
      <div class="health-item">
        <span class="health-dot green"></span>
        <span class="health-name">WISMO</span>
        <span class="health-status ok">healthy</span>
      </div>
      <div class="health-item">
        <span class="health-dot amber"></span>
        <span class="health-name">Cancel Save</span>
        <span class="health-status warn">degraded</span>
      </div>
    </div>
  </div>
</div>

<script>
async function loadOverview() {
  try {
    var [a, wf, esc, tl, ap] = await Promise.allSettled([
      api('/admin/api/analytics').catch(function(){ return {}; }),
      api('/admin/api/workflows').catch(function(){ return {workflows:[]}; }),
      api('/admin/api/escalations').catch(function(){ return {escalations:[]}; }),
      api('/admin/api/timeline?limit=10').catch(function(){ return {events:[]}; }),
      api('/admin/api/approvals?status=PENDING').catch(function(){ return {approvals:[], total:0}; }),
    ]);

    var analytics = a.value || {};
    var workflows = (wf.value || {workflows:[]}).workflows || [];
    var escalations = (esc.value || {escalations:[]}).escalations || [];
    var events = (tl.value || {events:[]}).events || [];
    var approvals = ap.value || {approvals:[], total:0};

    var active = workflows.filter(function(w){ return w.status === 'active' || w.status === 'paused'; });
    var recovered = workflows.filter(function(w){ return w.current_state === 'RECOVERED'; });
    var failed = workflows.filter(function(w){ return w.current_state === 'FAILED'; });
    var openEsc = escalations.filter(function(e){ return e.status === 'OPEN'; });

    // Hero KPI
    document.getElementById('kpiRevenue').textContent = '$' + ((analytics.recovered_revenue || 0)).toLocaleString();
    document.getElementById('kpiSaveRate').textContent = (analytics.save_rate || 0) + '%';
    document.getElementById('kpiActive').textContent = active.length;
    var attentionTotal = (approvals.total || 0) + openEsc.length + failed.length;
    document.getElementById('kpiAttention').textContent = attentionTotal;
    document.getElementById('attentionCount').textContent = attentionTotal + ' item' + (attentionTotal !== 1 ? 's' : '');

    // Attention Queue
    var queue = [];
    (approvals.approvals || []).slice(0, 4).forEach(function(a){
      queue.push({ type: 'approval', label: 'Approval: ' + (a.action_type || 'action'), severity: a.risk_level === 'high' ? 'err' : 'warn', id: a.id, time: a.created_at });
    });
    openEsc.slice(0, 4).forEach(function(e){
      queue.push({ type: 'escalation', label: (e.reason || 'Escalation').slice(0, 50), severity: e.sla_breached ? 'err' : 'warn', id: e.id, time: e.created_at });
    });
    failed.slice(0, 3).forEach(function(w){
      queue.push({ type: 'failure', label: 'Failed: ' + (w.workflow_type || 'workflow'), severity: 'err', id: w.id, time: w.updated_at || w.started_at });
    });
    queue.sort(function(a,b){ return (a.time||'') < (b.time||'') ? 1 : -1; });
    queue = queue.slice(0, 6);

    document.getElementById('attentionQueue').innerHTML = queue.length
      ? queue.map(function(q){
          var s = q.severity === 'err' ? '🔴' : '🟡';
          return '<div class="tl-row"><span style="flex-shrink:0">' + s + '</span><span class="muted" style="flex:1;font-size:12px">' + esc(q.label) + '</span><span class="pill ' + q.severity + '" style="font-size:9px">' + q.type + '</span></div>';
        }).join('')
      : '<div class="muted" style="padding:12px 0">All clear — no items need attention.</div>';

    // Live Feed
    document.getElementById('liveFeed').innerHTML = events.length
      ? events.map(function(e){
          var icon = (e.event_type||'').indexOf('recovered') >= 0 ? '✅' : (e.event_type||'').indexOf('escalation') >= 0 ? '🔴' : '📋';
          var time = e.created_at ? e.created_at.slice(11, 19) : '';
          return '<div class="tl-row"><span style="flex-shrink:0;width:16px">' + icon + '</span><span class="muted2" style="min-width:40px;font-size:11px">' + time + '</span><span class="muted" style="flex:1;font-size:12px">' + esc((e.event_type || e.description || '')).slice(0, 60) + '</span></div>';
        }).join('')
      : '<div class="muted" style="padding:12px 0">No activity yet.</div>';

    // Health
    var recoveredCount = recovered.length;
    var failedCount = failed.length;
    var total = recoveredCount + failedCount;
    var recoveryHealth = total > 0 && (recoveredCount / total) > 0.7 ? 'healthy' : (total > 0 ? 'degraded' : 'inactive');
    var wismoTotal = workflows.filter(function(w){ return w.workflow_type === 'wismo'; }).length;
    var wismoHealth = wismoTotal > 0 ? 'healthy' : 'inactive';
    var saveTotal = workflows.filter(function(w){ return w.workflow_type === 'cancellation_save'; }).length;
    var saveFailed = workflows.filter(function(w){ return w.workflow_type === 'cancellation_save' && w.current_state === 'FAILED'; }).length;
    var saveHealth = saveTotal > 3 && (saveFailed / saveTotal) < 0.3 ? 'healthy' : (saveTotal > 0 ? 'degraded' : 'inactive');

    document.getElementById('healthBlocks').innerHTML =
      '<div class="health-grid">' +
      '  <div class="health-item"><span class="health-dot ' + (recoveryHealth === 'healthy' ? 'green' : recoveryHealth === 'degraded' ? 'amber' : 'gray') + '"></span><span class="health-name">Recovery</span><span class="health-status ' + (recoveryHealth === 'healthy' ? 'ok' : 'warn') + '">' + recoveryHealth + '</span></div>' +
      '  <div class="health-item"><span class="health-dot ' + (wismoHealth === 'healthy' ? 'green' : 'gray') + '"></span><span class="health-name">WISMO</span><span class="health-status ' + (wismoHealth === 'healthy' ? 'ok' : 'muted') + '">' + wismoHealth + '</span></div>' +
      '  <div class="health-item"><span class="health-dot ' + (saveHealth === 'healthy' ? 'green' : saveHealth === 'degraded' ? 'amber' : 'gray') + '"></span><span class="health-name">Cancel Save</span><span class="health-status ' + (saveHealth === 'healthy' ? 'ok' : (saveHealth === 'degraded' ? 'warn' : 'muted')) + '">' + saveHealth + '</span></div>' +
      '</div>';

  } catch(e) { console.error('overview error:', e); }
}

loadOverview();
</script>

<style>
.hero-kpi {
  display:flex; align-items:center; gap:32px;
  padding:24px 0; margin-bottom:8px;
}
.hero-kpi-main { text-align:center; }
.hero-kpi-value { font-size:42px; font-weight:800; letter-spacing:-1.5px; color:var(--fg); display:block; line-height:1; }
.hero-kpi-label { font-size:12px; color:var(--muted2); text-transform:uppercase; letter-spacing:0.5px; margin-top:4px; }
.hero-kpi-supp { display:flex; gap:24px; }
.hero-kpi-stat { text-align:center; }
.hero-kpi-stat-value { font-size:22px; font-weight:700; color:var(--fg); display:block; }
.hero-kpi-stat-label { font-size:10px; color:var(--muted2); text-transform:uppercase; letter-spacing:0.3px; }

.tl-row { display:flex; align-items:center; gap:8px; padding:8px 0; border-bottom:1px solid var(--border); }
.tl-row:last-child { border-bottom:none; }

.health-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
.health-item { display:flex; align-items:center; gap:10px; padding:10px 14px; background:rgba(255,255,255,0.02); border-radius:8px; font-size:13px; }
.health-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.health-dot.green { background:var(--green); box-shadow:0 0 6px rgba(16,185,129,0.3); }
.health-dot.amber { background:var(--amber); box-shadow:0 0 6px rgba(245,158,11,0.3); }
.health-dot.gray { background:var(--muted2); opacity:0.4; }
.health-name { flex:1; font-weight:500; }
.health-status { font-size:11px; font-weight:600; text-transform:capitalize; }
.health-status.ok { color:var(--green); }
.health-status.warn { color:var(--amber); }
.health-status.muted { color:var(--muted2); }
</style>
{% endblock %}
