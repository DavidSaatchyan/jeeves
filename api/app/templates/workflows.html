{% extends "base.html" %}
{% block body %}
<h1>Workflows</h1>
<p class="page-desc">Active and recent workflow instances across all types.</p>

<div class="card">
  <div class="card-header">
    <h2>All workflows</h2>
    <div class="flex" style="gap:8px">
      <select id="wfTypeFilter" onchange="loadWorkflows()" style="width:auto">
        <option value="">All types</option>
        <option value="payment_recovery">Payment Recovery</option>
        <option value="cancellation_save">Cancellation Save</option>
        <option value="wismo">WISMO</option>
      </select>
      <select id="wfStatusFilter" onchange="loadWorkflows()" style="width:auto">
        <option value="">All statuses</option>
        <option value="active">Active</option>
        <option value="paused">Paused</option>
        <option value="escalated">Escalated</option>
        <option value="completed">Completed</option>
        <option value="failed">Failed</option>
      </select>
    </div>
  </div>
  <table class="table" id="wfTable">
    <thead>
      <tr>
        <th>ID</th>
        <th>Type</th>
        <th>Customer</th>
        <th>State</th>
        <th>Status</th>
        <th>Started</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="wfBody"></tbody>
  </table>
  <div id="wfPagination" class="flex" style="justify-content:center;margin-top:16px;gap:8px"></div>
</div>

<script>
var wfOffset = 0;
var wfTotal = 0;

async function loadWorkflows() {
  const type = document.getElementById('wfTypeFilter').value;
  const status = document.getElementById('wfStatusFilter').value;
  const params = new URLSearchParams();
  if (type) params.set('type', type);
  if (status) params.set('status', status);
  params.set('offset', wfOffset);
  params.set('limit', 50);
  const r = await fetch('/admin/api/workflows?' + params.toString());
  const data = await r.json();
  wfTotal = data.total || 0;
  const tbody = document.getElementById('wfBody');
  tbody.innerHTML = (data.workflows || []).map(w => `
    <tr>
      <td><code>${(w.id||'').slice(0,8)}</code></td>
      <td>${esc(w.workflow_type)}</td>
      <td>${w.customer_id ? esc(w.customer_id.slice(0,8)) : '-'}</td>
      <td><span class="pill ${(w.current_state||'').toLowerCase()}">${esc(w.current_state)}</span></td>
      <td><span class="pill ${w.status}">${esc(w.status)}</span></td>
      <td>${w.started_at ? new Date(w.started_at).toLocaleDateString() : '-'}</td>
      <td><a href="/admin/workflows/${w.id}" class="btn sm ghost">Detail</a></td>
    </tr>
  `).join('') || '<tr><td colspan="7" class="empty-state">No workflows found.</td></tr>';
  renderPagination();
}

function renderPagination() {
  var el = document.getElementById('wfPagination');
  var totalPages = Math.ceil(wfTotal / 50);
  if (totalPages <= 1) { el.innerHTML = ''; return; }
  var cur = Math.floor(wfOffset / 50) + 1;
  el.innerHTML = '<button class="ghost sm" onclick="wfOffset=Math.max(0,wfOffset-50);loadWorkflows()" ' + (wfOffset <= 0 ? 'disabled' : '') + '>← Prev</button>' +
    '<span class="muted2" style="font-size:12px">Page ' + cur + ' of ' + totalPages + '</span>' +
    '<button class="ghost sm" onclick="wfOffset=Math.min(wfOffset+50,(totalPages-1)*50);loadWorkflows()" ' + (wfOffset >= (totalPages-1)*50 ? 'disabled' : '') + '>Next →</button>';
}

loadWorkflows();
</script>

<style>
.pill { display:inline-block; padding:2px 10px; border-radius:20px; font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.3px; }
.pill.active { background:rgba(16,185,129,0.12); color:var(--green); }
.pill.paused { background:rgba(245,158,11,0.12); color:var(--amber); }
.pill.escalated { background:rgba(248,113,113,0.12); color:var(--red); }
.pill.completed { background:rgba(255,255,255,0.06); color:var(--muted2); }
.pill.failed { background:rgba(248,113,113,0.12); color:var(--red); }
.pill.detected, .pill.intent_detected, .pill.inquiry_detected { background:rgba(129,140,248,0.12); color:var(--accent); }
.pill.recovered, .pill.retained, .pill.resolved { background:rgba(16,185,129,0.12); color:var(--green); }
.pill.failed, .pill.cancelled { background:rgba(248,113,113,0.12); color:var(--red); }
</style>
{% endblock %}
