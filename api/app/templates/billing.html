{% extends "base.html" %}
{% block body %}
<h1>Billing</h1>

<div class="stats">
  <div class="stat"><div class="n" id="resolved">0</div><div class="l">Resolved this period</div></div>
  <div class="stat"><div class="n" id="limit">0</div><div class="l">Plan limit</div></div>
  <div class="stat"><div class="n" id="overage">$0</div><div class="l">Overage charge</div></div>
</div>

<div class="card">
  <h2 style="margin-bottom:16px">Usage</h2>
  <div class="usage-bar-wrap">
    <div class="usage-track"><div class="usage-fill" id="usageFill" style="width:0%"></div></div>
    <div class="usage-labels"><span id="usageUsed">0</span> / <span id="usageLimit">0</span> resolved</div>
  </div>
  <p class="muted mt-12" id="usageNote"></p>
</div>

<div class="card">
  <h2 style="margin-bottom:16px">Plan</h2>
  <div class="flex" style="justify-content:space-between;align-items:center">
    <div>
      <div class="plan-name" id="planName">Free</div>
      <p class="muted" id="planDesc" style="margin-top:4px">10 resolved dialogs included per month. Overage: $0.10 each.</p>
    </div>
    <button disabled>Upgrade</button>
  </div>
</div>


{% endblock %}

{% block tail %}
<style>
  .plan-name { font-size: 20px; font-weight: 800; letter-spacing: -.5px; color: var(--text); text-transform: capitalize; }
  .usage-bar-wrap { padding: 4px 0; }
  .usage-track { height: 12px; background: var(--bg); border-radius: 99px; overflow: hidden; border: 1px solid var(--border); }
  .usage-fill { height: 100%; background: #fff; border-radius: 99px; transition: width .4s ease; min-width: 2px; }
  .usage-fill.warn { background: var(--amber); }
  .usage-fill.danger { background: var(--red); }
  .usage-labels { font-size: 13px; color: var(--muted); margin-top: 8px; }
  .usage-labels span { color: var(--text); font-weight: 700; }
</style>
<script>
(async function(){
  var b = await api('/admin/api/billing');
  document.getElementById('resolved').textContent = b.resolved || 0;
  document.getElementById('limit').textContent = (b.dialogs_limit || 0).toLocaleString();
  var ov = b.overage_charge_usd || 0;
  document.getElementById('overage').textContent = ov > 0 ? '$'+ov.toFixed(2) : '$0';

  var pct = b.dialogs_limit > 0 ? Math.min((b.resolved || 0) / b.dialogs_limit * 100, 100) : 0;
  var fill = document.getElementById('usageFill');
  fill.style.width = pct.toFixed(1)+'%';
  if (pct >= 90) fill.classList.add('danger');
  else if (pct >= 70) fill.classList.add('warn');
  document.getElementById('usageUsed').textContent = b.resolved || 0;
  document.getElementById('usageLimit').textContent = (b.dialogs_limit || 0).toLocaleString();

  var note = document.getElementById('usageNote');
  if (ov > 0) note.textContent = 'You have exceeded your plan limit. Overage: $0.10 per additional resolved dialog.';
  else if (pct >= 90) note.textContent = 'Approaching plan limit.';
  else note.textContent = 'Test widget conversations are excluded from billing counters.';

  var plan = (b.plan || 'free');
  document.getElementById('planName').textContent = plan.charAt(0).toUpperCase() + plan.slice(1);
})();
</script>
{% endblock %}
