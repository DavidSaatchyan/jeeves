{% extends "base.html" %}
{% block body %}
<style>
.section { margin-bottom: 32px; }
.section h2 { font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }

/* Hero */
.agent-hero { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 24px; border-left: 3px solid #22d3ee; margin-bottom: 20px; }
.agent-hero-header { display: flex; align-items: center; gap: 14px; }
.agent-hero-logo { width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 800; flex-shrink: 0; }
.agent-hero-title { }
.agent-name { font-size: 18px; font-weight: 800; letter-spacing: -.3px; }
.agent-subtitle { font-size: 12px; color: var(--muted2); margin-top: 1px; }
.agent-hero-tagline { font-size: 13px; color: var(--muted); margin-top: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.agent-hero-section { margin-top: 14px; }
.agent-hero-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; color: var(--muted2); margin-bottom: 4px; }
.agent-hero-text { font-size: 13px; color: var(--muted); line-height: 1.55; }

/* State funnel */
.state-funnel { margin-top: 20px; }
.state-flow { display: flex; align-items: center; gap: 0; padding: 12px 0; overflow-x: auto; }
.state-flow .state-node { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.state-flow .state-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--border); flex-shrink: 0; }
.state-flow .state-dot.terminal { background: var(--amber); box-shadow: 0 0 8px rgba(245,158,11,0.3); }
.state-flow .state-dot.active { background: var(--cyan); box-shadow: 0 0 8px rgba(34,211,238,0.3); }
.state-flow .state-label { font-size: 11px; font-weight: 500; color: var(--muted2); white-space: nowrap; }
.state-flow .state-arrow { color: var(--border); font-size: 14px; margin: 0 4px; }

.state-distribution { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
.state-bar { display: flex; align-items: center; gap: 6px; padding: 6px 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; font-size: 12px; }
.state-bar .count { font-weight: 700; color: var(--text); min-width: 16px; text-align: center; }
.state-bar .name { color: var(--muted2); }
.state-bar .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.state-bar .dot.active { background: var(--cyan); }
.state-bar .dot.terminal { background: var(--amber); }
.state-bar .dot.idle { background: var(--border); }

/* Toggle in hero */
.toggle-wrapper { position: relative; display: inline-flex; }
.toggle.mini { width: 36px; height: 20px; }
.toggle.mini::after { width: 16px; height: 16px; }
.toggle.mini.on::after { transform: translateX(16px); }
.toggle.mini.disabled { opacity: 0.35; cursor: default; }
.toggle.mini.disabled::after { background: #666; }

/* Tooltip */
.tip-trigger { position: relative; }
.tip-pop {
  position: absolute; bottom: calc(100% + 10px); left: 50%; transform: translateX(-50%);
  background: #1a1a2e; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
  padding: 10px 14px; font-size: 12px; color: #c8c8e0; white-space: nowrap;
  opacity: 0; visibility: hidden; transition: all .2s; pointer-events: none;
  z-index: 50; box-shadow: 0 8px 24px rgba(0,0,0,0.5); line-height: 1.4;
}
.tip-trigger:hover .tip-pop { opacity: 1; visibility: visible; }
.tip-pop::after {
  content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
  border: 6px solid transparent; border-top-color: #1a1a2e;
}
.tip-pop a { color: #22d3ee; text-decoration: underline; }

/* Policy section */
.policy-section { margin-top: 16px; background: var(--bg); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
.policy-section h3 { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); margin-bottom: 16px; }

.policy-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); }
.policy-row:last-child { border-bottom: none; }
.policy-label { font-size: 13px; font-weight: 500; color: var(--text); }
.policy-desc { font-size: 11px; color: var(--muted2); margin-top: 2px; }
.policy-control { flex-shrink: 0; margin-left: 24px; }
.policy-control select { padding: 6px 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 12px; }
.policy-control input[type=number] { width: 64px; padding: 6px 8px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 12px; text-align: center; }
.policy-control .disabled { opacity: 0.4; pointer-events: none; }

.tag-chk { display: inline-flex; align-items: center; justify-content: center; gap: 4px; padding: 4px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 20px; font-size: 11px; cursor: pointer; user-select: none; min-width: 72px; height: 28px; box-sizing: border-box; }
.tag-chk input { display: none; }
.tag-chk:has(input:checked) { background: rgba(34,211,238,0.12); border-color: rgba(34,211,238,0.3); color: #22d3ee; }
.tag-chk.disabled { opacity: 0.4; pointer-events: none; }

.policy-toggle { width: 32px; height: 18px; border-radius: 9px; background: var(--border); cursor: pointer; position: relative; transition: background .2s; flex-shrink: 0; display: inline-block; }
.policy-toggle.on { background: #22d3ee; }
.policy-toggle::after { content: ''; position: absolute; top: 2px; left: 2px; width: 14px; height: 14px; border-radius: 50%; background: #fff; transition: transform .2s; }
.policy-toggle.on::after { transform: translateX(14px); }
.policy-toggle.disabled { opacity: 0.4; pointer-events: none; }

.policy-hint { font-size: 11px; color: var(--muted2); margin-top: 12px; font-style: italic; }

.conn-link { color: var(--amber); text-decoration: underline; cursor: pointer; transition: filter .15s; }
.conn-link:hover { filter: brightness(1.3); }
</style>

<div id="agentPanels"></div>
{% endblock %}

{% block tail %}
<script>
function esc(v){ return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&gt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

var WISMO = { id:'wismo', name:'WISMO', subtitle:'Order Tracking', color:'#22d3ee',
  icon:'<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>',
  tagline:'Agent tracks every Shopify order and tells customers exactly where it is — no support tickets needed.',
  states:['INQUIRY_DETECTED','VALIDATING_IDENTITY','RETRIEVING_SHIPMENT','CLASSIFYING_RISK','RESPONSE_SENT','RESOLVED','LOST'] };

function renderStats(agent, total, completed, inProgress, escalated, failed) {
  return '<div class="stats" style="grid-template-columns:repeat(auto-fit,minmax(130px,1fr))">' +
    '<div class="stat"><div class="n">'+total+'</div><div class="l">Total workflows</div></div>' +
    '<div class="stat"><div class="n">'+completed+'</div><div class="l">Resolved</div></div>' +
    '<div class="stat"><div class="n">'+inProgress+'</div><div class="l" title="Workflows currently in progress, not yet resolved">In Progress</div></div>' +
    '<div class="stat"><div class="n">'+escalated+'</div><div class="l">Escalated</div></div>' +
    '<div class="stat"><div class="n">'+failed+'</div><div class="l">Failed</div></div></div>';
}

function renderStateDistribution(agent, wfs) {
  var counts = {};
  agent.states.forEach(function(s){ counts[s] = 0; });
  wfs.filter(function(w){ return w.status === 'active' || w.status === 'paused'; }).forEach(function(w){
    if (w.current_state in counts) counts[w.current_state]++;
  });
  var totalActive = wfs.filter(function(w){ return w.status === 'active' || w.status === 'paused'; }).length;
  if (totalActive === 0) return '';

  var h = '<div class="state-funnel"><div class="agent-hero-label">Active workflows by stage</div><div class="state-distribution">';
  agent.states.forEach(function(s){
    var c = counts[s] || 0;
    if (c === 0) return;
    var cls = s === 'LOST' || s === 'RESOLVED' ? 'terminal' : 'active';
    h += '<div class="state-bar"><div class="dot '+cls+'"></div><span class="count">'+c+'</span><span class="name">'+s.charAt(0)+s.slice(1).toLowerCase().replace(/_/g,' ')+'</span></div>';
  });
  return h + '</div></div>';
}

function renderPolicySettings(policies, disabled) {
  var wp = policies.wismo || {};
  var d = disabled ? ' disabled' : '';
  var autoNotify = wp.auto_notify !== false;
  var threshold = wp.auto_notify_threshold || 'delayed';
  var channels = wp.notification_channels || ['widget'];
  var delayDays = wp.escalation_delay_days || 7;
  var autoEscalate = wp.auto_escalate_lost !== false;
  var maxNotif = wp.max_notifications_per_workflow || 3;
  var maxSilent = wp.max_silent_tracking_days || 14;

  var chk = function(val, arr) { return arr.indexOf(val) !== -1 ? 'checked' : ''; };

  return '<div class="policy-section"><h3>Settings' + (disabled ? ' <span style="color:var(--muted2);font-weight:400;text-transform:none;letter-spacing:0">— connect Shopify to configure</span>' : '') + '</h3>' +
    '<div class="policy-row"><div><div class="policy-label">Auto-notify customers</div><div class="policy-desc">Send proactive tracking updates via selected channels</div></div><div class="policy-control"><div class="policy-toggle' + d + ' ' + (autoNotify ? 'on' : '') + '" id="pol-autoNotify" ' + (disabled ? '' : 'onclick="togglePolicy(\'auto_notify\')"') + '></div></div></div>' +
    '<div class="policy-row"><div><div class="policy-label">Notify from status</div><div class="policy-desc">Minimum tracking status to trigger notification</div></div><div class="policy-control"><select id="pol-threshold"' + d + ' onchange="savePolicy()"><option value="delayed"' + (threshold === 'delayed' ? ' selected' : '') + '>Only delays & lost</option><option value="lost"' + (threshold === 'lost' ? ' selected' : '') + '>Lost packages only</option><option value="all"' + (threshold === 'all' ? ' selected' : '') + '>All tracking updates</option></select></div></div>' +
    '<div class="policy-row"><div><div class="policy-label">Notification channels</div><div class="policy-desc">Where to send proactive notifications</div></div><div class="policy-control" style="display:flex;gap:6px">' +
    '<label class="tag-chk' + d + '"><input type="checkbox" value="widget" ' + chk('widget', channels) + ' onchange="savePolicy()"> Widget</label>' +
    '<label class="tag-chk' + d + '"><input type="checkbox" value="email" ' + chk('email', channels) + ' onchange="savePolicy()"> Email</label></div></div>' +
    '<div class="policy-row"><div><div class="policy-label">Escalate after delay (days)</div><div class="policy-desc">Auto-escalate if tracking shows delayed beyond this</div></div><div class="policy-control"><input type="number" id="pol-escalationDays" value="' + delayDays + '" min="1" max="30"' + d + ' onchange="savePolicy()"></div></div>' +
    '<div class="policy-row"><div><div class="policy-label">Auto-escalate lost packages</div><div class="policy-desc">Escalate immediately when carrier marks as lost</div></div><div class="policy-control"><div class="policy-toggle' + d + ' ' + (autoEscalate ? 'on' : '') + '" id="pol-autoEscalate" ' + (disabled ? '' : 'onclick="togglePolicy(\'auto_escalate_lost\')"') + '></div></div></div>' +
    '<div class="policy-row"><div><div class="policy-label">Max notifications per workflow</div><div class="policy-desc">Stop sending after this many notifications</div></div><div class="policy-control"><input type="number" id="pol-maxNotif" value="' + maxNotif + '" min="1" max="20"' + d + ' onchange="savePolicy()"></div></div>' +
    '<div class="policy-row"><div><div class="policy-label">Max silent tracking days</div><div class="policy-desc">Escalate if no tracking update for this long</div></div><div class="policy-control"><input type="number" id="pol-maxSilent" value="' + maxSilent + '" min="1" max="60"' + d + ' onchange="savePolicy()"></div></div>' +
    (disabled ? '' : '<div class="policy-hint">Changes are saved automatically.</div>') + '</div>';
}

function renderAgentPanel(agent, enabled, shopifyConnected, total, completed, inProgress, escalated, failed, wfs, policies) {
  var h = '<div class="ch-panel active"><div class="agent-hero" style="border-left-color:' + agent.color + '"><div class="agent-hero-header">' +
    '<div class="agent-hero-logo" style="background:rgba(' + hexToRgb(agent.color) + ',0.12);color:' + agent.color + '">' + agent.icon + '</div>' +
    '<div class="agent-hero-title"><div class="agent-name">' + agent.name + '</div><div class="agent-subtitle">' + agent.subtitle + '</div></div>' +
    '<div style="margin-left:auto;display:flex;align-items:center;gap:10px">' +
    '<span class="pill ' + (enabled ? 'ok' : 'muted') + '" style="font-size:10px" id="statusBadge">' + (enabled ? 'Active' : 'Disabled') + '</span>';

  // Toggle — not clickable if Shopify not connected
  if (!shopifyConnected) {
    h += '<div class="toggle-wrapper tip-trigger"><div class="toggle mini disabled" id="mainToggle"></div>' +
      '<div class="tip-pop">Connect Shopify first to enable WISMO</div></div>';
    h += '<div class="conn-warn" style="margin-top:10px;font-size:12px;color:var(--amber)">⚠ <a href="/admin/connections" class="conn-link">Connect Shopify</a> to start tracking orders.</div>';
  } else {
    h += '<div class="toggle-wrapper"><div class="toggle mini ' + (enabled ? 'on' : '') + '" id="mainToggle" onclick="toggleWismo()"></div></div>';
  }

  h += '</div></div><div class="agent-hero-tagline">' + agent.tagline + '</div>';

  if (shopifyConnected) {
    h += '<div class="agent-hero-section"><div class="agent-hero-label">How it works</div><div class="agent-hero-text">Order inquiries from your widget are classified by AI, fulfillment data is pulled from Shopify, tracking status is analyzed, and customers get real-time responses — no human needed for 70-80% of cases.</div></div>';
  }

  h += renderStats(agent, total, completed, inProgress, escalated, failed);
  h += renderStateDistribution(agent, wfs);
  h += renderPolicySettings(policies, !shopifyConnected);

  return h + '</div>';
}

function renderAll(workflows, policies, shopifyConnected) {
  var ew = policies.enabled_workflows || {};
  var enabled = 'wismo' in ew ? ew.wismo !== false : true;
  var wfs = workflows.filter(function(w){ return w.workflow_type === 'wismo'; });
  var total = wfs.length;
  var inProgress = wfs.filter(function(w){ return w.status === 'active' || w.status === 'paused'; }).length;
  var completed = wfs.filter(function(w){ return w.status === 'completed'; }).length;
  var escalated = wfs.filter(function(w){ return w.status === 'escalated'; }).length;
  var failed = wfs.filter(function(w){ return w.status === 'failed' || w.current_state === 'FAILED' || w.current_state === 'CANCELLED' || w.current_state === 'LOST'; }).length;
  document.getElementById('agentPanels').innerHTML = renderAgentPanel(WISMO, enabled, shopifyConnected, total, completed, inProgress, escalated, failed, wfs, policies);
}

function hexToRgb(h){ var r = parseInt(h.slice(1, 3), 16), g = parseInt(h.slice(3, 5), 16), b = parseInt(h.slice(5, 7), 16); return r + ',' + g + ',' + b; }

// ─── WISMO enable/disable ───────────────────────────────────────
async function toggleWismo() {
  try {
    var pols = await api('/admin/api/policies');
    var ew = pols.enabled_workflows || {};
    var currentlyOn = 'wismo' in ew ? ew.wismo !== false : true;

    ew.wismo = currentlyOn ? false : true;
    await api('/admin/api/policies/enabled_workflows', {method: 'PUT', body: ew});
    var toggle = document.getElementById('mainToggle');
    var badge = document.getElementById('statusBadge');
    if (toggle) { toggle.classList.toggle('on'); }
    if (badge) {
      var isOn = 'wismo' in ew ? ew.wismo !== false : true;
      badge.textContent = isOn ? 'Active' : 'Disabled';
      badge.className = 'pill ' + (isOn ? 'ok' : 'muted');
    }
  } catch(e) { alert('Error: ' + e.message); }
}

// ─── Policy save ────────────────────────────────────────────────
function readPolicy() {
  return {
    auto_notify: document.getElementById('pol-autoNotify') ? document.getElementById('pol-autoNotify').classList.contains('on') : true,
    auto_notify_threshold: document.getElementById('pol-threshold') ? document.getElementById('pol-threshold').value : 'delayed',
    notification_channels: Array.from(document.querySelectorAll('#policySection input[type=checkbox]:checked')).map(function(cb){ return cb.value; }),
    escalation_delay_days: parseInt(document.getElementById('pol-escalationDays')?.value || '7'),
    auto_escalate_lost: document.getElementById('pol-autoEscalate') ? document.getElementById('pol-autoEscalate').classList.contains('on') : true,
    max_notifications_per_workflow: parseInt(document.getElementById('pol-maxNotif')?.value || '3'),
    max_silent_tracking_days: parseInt(document.getElementById('pol-maxSilent')?.value || '14'),
  };
}

function togglePolicy(key) {
  var el = document.getElementById('pol-' + key.charAt(0).toUpperCase() + key.slice(1));
  if (el) el.classList.toggle('on');
  savePolicy();
}

async function savePolicy() {
  try {
    await api('/admin/api/policies/wismo', {method: 'PUT', body: readPolicy()});
  } catch(e) { /* silent */ }
}

// ─── Load all ───────────────────────────────────────────────────
async function loadAll() {
  try {
    var [policies, wfData, integrations] = await Promise.all([
      api('/admin/api/policies'),
      api('/admin/api/workflows?limit=200'),
      api('/admin/api/integrations'),
    ]);
    var shopifyConnected = (integrations.native_connectors || []).some(function(c){ return c.provider === 'shopify' && c.status === 'connected'; });
    renderAll(wfData.workflows || [], policies, shopifyConnected);
  } catch(e) { document.getElementById('agentPanels').innerHTML = '<div class="card" style="text-align:center;padding:40px;color:var(--muted2)">Error loading agents: ' + esc(e.message) + '</div>'; }
}
loadAll();
</script>
{% endblock %}
