{% extends "base.html" %}
{% block body %}
<style>
.section { margin-bottom: 36px; }
.section h2 { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; color: var(--muted2); margin-bottom: 18px; display: flex; align-items: center; gap: 8px; }

/* Hero */
.agent-hero { background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; border-left: 3px solid #5bc0de; margin-bottom: 18px; }
.agent-hero:hover { border-color: var(--border-bright); background: rgba(255,255,255,0.03); }
.agent-hero-header { display: flex; align-items: center; gap: 16px; }
.agent-hero-logo { width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 800; flex-shrink: 0; }
.agent-name { font-size: 20px; font-weight: 700; letter-spacing: -.3px; }
.agent-subtitle { font-size: 13px; color: var(--muted2); margin-top: 2px; }
.agent-hero-tagline { font-size: 14px; color: var(--muted); margin-top: 16px; margin-bottom: 20px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.agent-hero-section { margin-top: 16px; }
.agent-hero-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; color: var(--muted2); margin-bottom: 6px; }
.agent-hero-text { font-size: 14px; color: var(--muted); line-height: 1.65; }

/* KPI strip */
.kpi-strip { display: flex; align-items: center; gap: 0; padding: 10px 0; margin: 16px 0 6px; border-top: 1px solid var(--border); }
.kpi-item { display: flex; align-items: center; gap: 6px; padding: 0 12px; flex: 1; justify-content: center; min-width: 0; }
.kpi-item + .kpi-item { border-left: 1px solid var(--border); }
.kpi-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.kpi-n { font-size: 16px; font-weight: 700; color: var(--text); letter-spacing: -.3px; }
.kpi-l { font-size: 10px; color: var(--muted2); text-transform: uppercase; letter-spacing: .4px; font-weight: 600; white-space: nowrap; }
.state-funnel { margin-top: 18px; }
.state-flow { display: flex; align-items: center; gap: 0; padding: 12px 0; overflow-x: auto; }
.state-flow .state-node { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.state-flow .state-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--border); flex-shrink: 0; }
.state-flow .state-dot.terminal { background: var(--amber); box-shadow: 0 0 6px rgba(245,166,35,0.3); }
.state-flow .state-dot.active { background: var(--cyan); box-shadow: 0 0 6px rgba(91,192,222,0.3); }
.state-flow .state-label { font-size: 11px; font-weight: 500; color: var(--muted2); white-space: nowrap; }
.state-flow .state-arrow { color: var(--border); font-size: 13px; margin: 0 4px; }

.state-distribution { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
.state-bar { display: flex; align-items: center; gap: 6px; padding: 6px 10px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 12px; }

/* Toggle in hero */
.toggle-wrapper { position: relative; display: inline-flex; }
.toggle.mini { width: 36px; height: 20px; }
.toggle.mini::after { width: 16px; height: 16px; }
.toggle.mini.on::after { transform: translateX(16px); }
.toggle.mini.disabled { opacity: 0.35; cursor: default; }
.toggle.mini.disabled::after { background: #666; }

/* Tooltip */
.tip-trigger { position: relative; }
.tip-pop {
  position: absolute; bottom: calc(100% + 10px); left: 50%; transform: translateX(-50%);
  background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
  padding: 10px 14px; font-size: 12px; color: var(--muted); white-space: nowrap;
  opacity: 0; visibility: hidden; transition: all .1s; pointer-events: none;
  z-index: 50; line-height: 1.5;
}
.tip-trigger:hover .tip-pop { opacity: 1; visibility: visible; }
.tip-pop::after {
  content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
  border: 6px solid transparent; border-top-color: var(--surface);
}
.tip-pop a { color: var(--accent); text-decoration: underline; }

/* Policy section */
.policy-section { margin-top: 16px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
.policy-section h3 { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--muted2); margin-bottom: 16px; }

.policy-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); }
.policy-row:last-child { border-bottom: none; }
.policy-label { font-size: 14px; font-weight: 500; color: var(--text); }
.policy-desc { font-size: 12px; color: var(--muted2); margin-top: 2px; }
.policy-control { flex-shrink: 0; margin-left: 24px; }
.policy-control select { padding: 6px 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 5px; color: var(--text); font-size: 13px; }
.policy-control input[type=number] { width: 70px; padding: 6px 8px; background: var(--surface); border: 1px solid var(--border); border-radius: 5px; color: var(--text); font-size: 13px; text-align: center; }
.policy-control .disabled { opacity: 0.4; pointer-events: none; }

.tag-chk { display: inline-block; padding: 6px 14px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 12px; line-height: 1; cursor: pointer; user-select: none; min-width: 70px; text-align: center; vertical-align: middle; }
.tag-chk.on { background: rgba(91,192,222,0.12); border-color: rgba(91,192,222,0.3); color: var(--cyan); }
.tag-chk.disabled { opacity: 0.4; pointer-events: none; }

.policy-toggle { width: 32px; height: 18px; border-radius: 9px; background: var(--border); cursor: pointer; position: relative; transition: background .1s; flex-shrink: 0; display: inline-block; }
.policy-toggle.on { background: var(--cyan); }
.policy-toggle::after { content: ''; position: absolute; top: 3px; left: 3px; width: 12px; height: 12px; border-radius: 50%; background: #fff; transition: transform .1s; }
.policy-toggle.on::after { transform: translateX(14px); }
.policy-toggle.disabled { opacity: 0.4; pointer-events: none; }

.policy-hint { font-size: 12px; color: var(--muted2); margin-top: 12px; font-style: italic; }

.conn-link { color: var(--amber); text-decoration: underline; cursor: pointer; transition: filter .1s; }
.conn-link:hover { filter: brightness(1.3); }
</style>

<div class="ch-tabs">
  <button class="ch-tab active" data-agent="appointment" onclick="selectAgent('appointment')">
    <span class="ch-tab-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></span>
    Appointment Manager
    <span class="ch-tab-badge" style="color:var(--cyan);font-size:10px" id="count-appointment">0</span>
  </button>
  <button class="ch-tab" data-agent="marketing" onclick="selectAgent('marketing')">
    <span class="ch-tab-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 18H2a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h20a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2z"/><polyline points="11 12 8 12 8 9 11 9"/><path d="M16 9h3v3h-3z"/></svg></span>
    Marketing Funnel
    <span class="ch-tab-badge" style="color:var(--amber);font-size:10px" id="count-marketing">0</span>
  </button>
  <button class="ch-tab" data-agent="followup" onclick="selectAgent('followup')">
    <span class="ch-tab-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg></span>
    Patient Follow-up
    <span class="ch-tab-badge" style="color:var(--green);font-size:10px" id="count-followup">0</span>
  </button>
</div>

<div id="agentPanels"></div>
{% endblock %}

{% block tail %}
<script>
function esc(v){ return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&gt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

var AGENTS = [
  {
    id: 'appointment', name: 'Appointment Manager', subtitle: 'Booking & Scheduling',
    color: '#22d3ee',
    icon: '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>',
    tagline: 'Manages appointment booking, reminders, rescheduling, and no-show detection.',
    states: ['AWAITING_INTENT','CHECKING_SCHEDULE','OFFERING_SLOTS','CONFIRMING','BOOKED','REMINDER_SENT','ARRIVED','NO_SHOW','COMPLETED','CANCELLED']
  },
  {
    id: 'marketing', name: 'Marketing Funnel', subtitle: 'Campaigns & Lead Nurturing',
    color: '#f59e0b',
    icon: '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 18H2a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h20a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2z"/><polyline points="11 12 8 12 8 9 11 9"/><path d="M16 9h3v3h-3z"/></svg>',
    tagline: 'Automates marketing campaigns, lead qualification, and patient conversion tracking.',
    states: ['LEAD_CAPTURED','QUALIFYING','NURTURING','APPOINTMENT_BOOKED','FOLLOW_UP','CONVERTED','LOST','ESCALATED']
  },
  {
    id: 'followup', name: 'Patient Follow-up', subtitle: 'Post-Visit Care',
    color: '#22a67e',
    icon: '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>',
    tagline: 'Post-visit wellness checks, medication adherence pings, and satisfaction surveys.',
    states: ['VISIT_COMPLETED','DAY_1_CHECK','DAY_7_CHECK','DAY_30_CHECK','MEDICATION_ADHERENCE','SATISFACTION_SURVEY','CLOSED','ESCALATED']
  }
];

var currentAgent = window.location.hash ? window.location.hash.slice(1) : 'appointment';

function selectAgent(agentId) {
  currentAgent = agentId;
  document.querySelectorAll('.ch-tab').forEach(function(t){ t.classList.remove('active'); });
  var tab = document.querySelector('.ch-tab[data-agent="'+agentId+'"]');
  if(tab) tab.classList.add('active');
  renderCurrentAgent();
}

function renderStats(total, active, completed, escalated, failed) {
  return '<div class="kpi-strip">' +
    '<div class="kpi-item"><span class="kpi-dot" style="background:#6868a0"></span><span class="kpi-n">' + total + '</span><span class="kpi-l">Total</span></div>' +
    '<div class="kpi-item"><span class="kpi-dot" style="background:#22c55e"></span><span class="kpi-n">' + completed + '</span><span class="kpi-l">Resolved</span></div>' +
    '<div class="kpi-item"><span class="kpi-dot" style="background:#22d3ee"></span><span class="kpi-n">' + active + '</span><span class="kpi-l">Active</span></div>' +
    '<div class="kpi-item"><span class="kpi-dot" style="background:#f59e0b"></span><span class="kpi-n">' + escalated + '</span><span class="kpi-l">Escalated</span></div>' +
    '<div class="kpi-item"><span class="kpi-dot" style="background:#ef4444"></span><span class="kpi-n">' + failed + '</span><span class="kpi-l">Failed</span></div>' +
    '</div>';
}

function renderStateDistribution(agent, wfs) {
  var counts = {};
  agent.states.forEach(function(s){ counts[s] = 0; });
  wfs.filter(function(w){ return w.status === 'active' || w.status === 'paused'; }).forEach(function(w){
    if (w.current_state in counts) counts[w.current_state]++;
  });
  var totalActive = wfs.filter(function(w){ return w.status === 'active' || w.status === 'paused'; }).length;
  if (totalActive === 0) return '';

  var h = '<div class="state-funnel"><div class="agent-hero-label">Active workflows by stage</div><div class="state-distribution">';
  agent.states.forEach(function(s){
    var c = counts[s] || 0;
    if (c === 0) return;
    var cls = s === 'CLOSED' || s === 'CONVERTED' || s === 'COMPLETED' ? 'terminal' : 'active';
    h += '<div class="state-bar"><div class="state-dot '+cls+'"></div><span class="count">'+c+'</span><span class="name">'+s.charAt(0)+s.slice(1).toLowerCase().replace(/_/g,' ')+'</span></div>';
  });
  return h + '</div></div>';
}

function renderPolicySettings() {
  return '<div class="policy-section"><h3>Settings</h3><p class="muted">Configuration coming soon.</p></div>';
}

function renderAgentPanel(agent, enabled, total, active, completed, escalated, failed, wfs) {
  var h = '<div class="ch-panel active"><div class="agent-hero" style="border-left-color:' + agent.color + '"><div class="agent-hero-header">' +
    '<div class="agent-hero-logo" style="background:rgba(' + hexToRgb(agent.color) + ',0.12);color:' + agent.color + '">' + agent.icon + '</div>' +
    '<div class="agent-hero-title"><div class="agent-name">' + agent.name + '</div><div class="agent-subtitle">' + agent.subtitle + '</div></div>' +
    '<div style="margin-left:auto;display:flex;align-items:center;gap:10px">' +
    '<span class="pill ' + (enabled ? 'ok' : 'muted') + '" style="font-size:11px" id="statusBadge-' + agent.id + '">' + (enabled ? 'Active' : 'Disabled') + '</span>' +
    '<div class="toggle-wrapper"><div class="toggle mini ' + (enabled ? 'on' : '') + '" id="mainToggle-' + agent.id + '" onclick="toggleAgent(\'' + agent.id + '\')"></div></div>' +
    '</div></div><div class="agent-hero-tagline">' + agent.tagline + '</div>';

  h += renderStats(total, active, completed, escalated, failed);
  h += renderStateDistribution(agent, wfs);
  h += renderPolicySettings();

  return h + '</div>';
}

function hexToRgb(h){ var r = parseInt(h.slice(1, 3), 16), g = parseInt(h.slice(3, 5), 16), b = parseInt(h.slice(5, 7), 16); return r + ',' + g + ',' + b; }

function renderCurrentAgent() {
  var agent = AGENTS.find(function(a){ return a.id === currentAgent; });
  if (!agent) return;

  var wfs = allWorkflows.filter(function(w){ return w.workflow_type === agent.id; });
  var total = wfs.length;
  var active = wfs.filter(function(w){ return w.status === 'active' || w.status === 'paused'; }).length;
  var completed = wfs.filter(function(w){ return w.status === 'completed'; }).length;
  var escalated = wfs.filter(function(w){ return w.status === 'escalated'; }).length;
  var failed = wfs.filter(function(w){ return w.status === 'failed' || w.current_state === 'FAILED' || w.current_state === 'CANCELLED'; }).length;

  var ew = policies.enabled_workflows || {};
  var enabled = agent.id in ew ? ew[agent.id] !== false : true;

  document.getElementById('agentPanels').innerHTML = renderAgentPanel(agent, enabled, total, active, completed, escalated, failed, wfs);
}

var allWorkflows = [];
var policies = {};

async function toggleAgent(agentId) {
  try {
    var ew = policies.enabled_workflows || {};
    var currentlyOn = agentId in ew ? ew[agentId] !== false : true;
    ew[agentId] = currentlyOn ? false : true;
    await api('/admin/api/policies/enabled_workflows', {method: 'PUT', body: ew});
    policies.enabled_workflows = ew;
    renderCurrentAgent();
  } catch(e) { alert('Error: ' + e.message); }
}

async function loadAll() {
  try {
    var [policiesData, wfData] = await Promise.all([
      api('/admin/api/policies'),
      api('/admin/api/workflows?limit=500'),
    ]);
    policies = policiesData;
    allWorkflows = wfData.workflows || [];

    // Update tab badges
    ['appointment','marketing','followup'].forEach(function(t){
      var badge = document.getElementById('count-'+t);
      if(badge) {
        var c = allWorkflows.filter(function(w){ return w.workflow_type === t && (w.status === 'active' || w.status === 'paused'); }).length;
        badge.textContent = c;
      }
    });

    // Select initial agent from hash or default
    currentAgent = window.location.hash ? window.location.hash.slice(1) : 'appointment';
    selectAgent(currentAgent);
  } catch(e) { document.getElementById('agentPanels').innerHTML = '<div class="card" style="text-align:center;padding:40px;color:var(--muted2)">Error loading agents: ' + esc(e.message) + '</div>'; }
}

// Listen for hash changes
window.addEventListener('hashchange', function(){
  var hash = window.location.hash ? window.location.hash.slice(1) : 'appointment';
  if (hash !== currentAgent) selectAgent(hash);
});

loadAll();
</script>
{% endblock %}
