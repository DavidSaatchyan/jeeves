{% extends "base.html" %}
{% block body %}
<style>
.section { margin-bottom: 32px; }
.section h2 { font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }

/* Hero */
.agent-hero { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 24px; border-left: 3px solid #22d3ee; margin-bottom: 20px; }
.agent-hero-header { display: flex; align-items: center; gap: 14px; }
.agent-hero-logo { width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 800; flex-shrink: 0; }
.agent-hero-title { }
.agent-name { font-size: 18px; font-weight: 800; letter-spacing: -.3px; }
.agent-subtitle { font-size: 12px; color: var(--muted2); margin-top: 1px; }
.agent-hero-tagline { font-size: 13px; color: var(--muted); margin-top: 14px; max-width: 600px; line-height: 1.55; }
.agent-hero-section { margin-top: 14px; }
.agent-hero-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; color: var(--muted2); margin-bottom: 4px; }
.agent-hero-text { font-size: 13px; color: var(--muted); line-height: 1.55; }

/* State visualization */
.states-viz { display: flex; align-items: center; gap: 0; padding: 20px 0; overflow-x: auto; }
.state-node { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.state-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--border); flex-shrink: 0; }
.state-dot.terminal { background: var(--amber); box-shadow: 0 0 8px rgba(245,158,11,0.3); }
.state-dot.active { background: var(--cyan); box-shadow: 0 0 8px rgba(34,211,238,0.3); }
.state-label { font-size: 11px; font-weight: 500; color: var(--muted2); white-space: nowrap; }
.state-arrow { color: var(--border); font-size: 14px; margin: 0 4px; }

/* Toggle in hero */
.toggle.mini { width: 36px; height: 20px; }
.toggle.mini::after { width: 16px; height: 16px; }
.toggle.mini.on::after { transform: translateX(16px); }
</style>

<p class="page-desc">Intelligent agents that automate customer lifecycle workflows.</p>
<div id="agentPanels"></div>
{% endblock %}

{% block tail %}
<script>
function esc(v){ return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

var WISMO = { id:'wismo', name:'WISMO', subtitle:'Order Tracking', color:'#22d3ee',
  tagline:'Answer "Where Is My Order?" automatically with real-time tracking from Shopify.',
  whatItDoes:'WISMO intercepts fulfillment events from Shopify, classifies tracking status via AI, and proactively communicates delivery updates through the widget — reducing support tickets and keeping customers informed.',
  states:['INQUIRY_DETECTED','VALIDATING_IDENTITY','RETRIEVING_SHIPMENT','CLASSIFYING_RISK','RESPONSE_SENT','RESOLVED','LOST'] };

function renderAgentPanel(agent, enabled, total, completed, active, escalated, failed) {
  var h = '<div class="ch-panel active"><div class="agent-hero" style="border-left-color:'+agent.color+'"><div class="agent-hero-header">' +
    '<div class="agent-hero-logo" style="background:rgba('+hexToRgb(agent.color)+',0.12);color:'+agent.color+'">WM</div>' +
    '<div class="agent-hero-title"><div class="agent-name">'+agent.name+'</div><div class="agent-subtitle">'+agent.subtitle+'</div></div>' +
    '<div style="margin-left:auto;display:flex;align-items:center;gap:10px">' +
    '<span class="pill '+(enabled?'ok':'muted')+'" style="font-size:10px">'+(enabled?'Active':'Disabled')+'</span>' +
    '<div class="toggle mini '+(enabled?'on':'')+'" onclick="legacyToggle(\''+agent.id+'\', this)"></div></div></div>' +
    '<div class="agent-hero-tagline">'+agent.tagline+'</div>' +
    '<div class="agent-hero-section"><div class="agent-hero-label">What it does</div><div class="agent-hero-text">'+agent.whatItDoes+'</div></div></div>';

  h += '<div class="stats" style="grid-template-columns:repeat(auto-fit,minmax(130px,1fr))">' +
    '<div class="stat"><div class="n">'+total+'</div><div class="l">Total</div></div>' +
    '<div class="stat"><div class="n">'+completed+'</div><div class="l">Resolved</div></div>' +
    '<div class="stat"><div class="n">'+active+'</div><div class="l">Active</div></div>' +
    '<div class="stat"><div class="n">'+escalated+'</div><div class="l">Escalated</div></div>' +
    '<div class="stat"><div class="n">'+failed+'</div><div class="l">Failed</div></div></div>';

  if (agent.states) {
    h += '<div class="states-viz">';
    for (var i = 0; i < agent.states.length; i++) {
      var s = agent.states[i];
      var term = s === 'LOST' || s === 'RESOLVED';
      h += '<div class="state-node"><div class="state-dot '+(term?'terminal':'')+'"></div><div class="state-label">'+s.charAt(0)+s.slice(1).toLowerCase()+'</div>'+(i<agent.states.length-1?'<div class="state-arrow">→</div>':'')+'</div>';
    }
    h += '</div>';
  }

  return h + '</div>';
}

function renderAll(workflows, ew) {
  var enabled = 'wismo' in ew ? ew.wismo !== false : true;
  var wfs = workflows.filter(function(w){ return w.workflow_type === 'wismo'; });
  var total = wfs.length;
  var active = wfs.filter(function(w){ return w.status === 'active' || w.status === 'paused'; }).length;
  var completed = wfs.filter(function(w){ return w.status === 'completed'; }).length;
  var escalated = wfs.filter(function(w){ return w.status === 'escalated'; }).length;
  var failed = wfs.filter(function(w){ return w.status==='failed'||w.current_state==='FAILED'||w.current_state==='CANCELLED'||w.current_state==='LOST'; }).length;
  document.getElementById('agentPanels').innerHTML = renderAgentPanel(WISMO, enabled, total, completed, active, escalated, failed);
}

function hexToRgb(h){ var r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16); return r+','+g+','+b; }

async function legacyToggle(type, el) {
  var on = el.classList.contains('on');
  try {
    var pols = await api('/admin/api/policies');
    var ew = pols.enabled_workflows || {};
    ew[type] = !on;
    await api('/admin/api/policies/enabled_workflows', {method:'PUT', body:ew});
    el.classList.toggle('on');
    var b = el.closest('.agent-hero').querySelector('.pill');
    if (b) { b.textContent = !on ? 'Active' : 'Disabled'; b.className = 'pill ' + (!on ? 'ok' : 'muted'); }
  } catch(e) {}
}

async function loadAll() {
  try {
    var [policies, wfData] = await Promise.all([
      api('/admin/api/policies'), api('/admin/api/workflows?limit=200')
    ]);
    renderAll(wfData.workflows || [], policies.enabled_workflows || {});
  } catch(e) { document.getElementById('agentPanels').innerHTML = '<div class="card" style="text-align:center;padding:40px;color:var(--muted2)">Error loading agents: ' + esc(e.message) + '</div>'; }
}
loadAll();
</script>
{% endblock %}
