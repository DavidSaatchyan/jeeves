[supervisord]
nodaemon=true
logfile=/dev/stdout
logfile_maxbytes=0
logfile_backups=0

[program:api]
command=uvicorn app.main:app --host 0.0.0.0 --port 8000
directory=/app
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
redirect_stderr=true
autorestart=true
startsecs=3
startretries=10
stopsignal=TERM
stopwaitsecs=10

[program:worker]
command=celery -A worker.tasks worker --loglevel=info --workdir /app
directory=/app
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
redirect_stderr=true
autorestart=true
startsecs=3
startretries=10
stopsignal=TERM
stopwaitsecs=30
