[supervisord]
nodaemon=true
logfile=/dev/null
logfile_maxbytes=0
user=root

[program:api]
command=uvicorn app.main:app --host 0.0.0.0 --port 8000
directory=/app
user=appuser
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
redirect_stderr=true
autorestart=true
startsecs=5
startretries=3

[program:worker]
command=celery -A worker.tasks worker --loglevel=info --workdir /app
directory=/app
user=appuser
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
redirect_stderr=true
autorestart=true
startsecs=5
startretries=3
