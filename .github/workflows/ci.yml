name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: jeeves
          POSTGRES_PASSWORD: jeeves
          POSTGRES_DB: jeeves_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"

      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('api/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r api/requirements.txt

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check api/app/ api/tests/

      - name: Test with pytest
        env:
          DATABASE_URL: postgresql://jeeves:jeeves@localhost:5432/jeeves_test
          JWT_SECRET: ci-test-secret
          OPENAI_API_KEY: sk-test
          ENCRYPTION_KEY: ci-test-key-that-is-exactly-32-bytes!!
        run: |
          pip install pytest pytest-asyncio
          pytest api/tests/ -v --tb=short -W ignore::DeprecationWarning
