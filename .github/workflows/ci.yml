name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: jeeves
          POSTGRES_PASSWORD: jeeves
          POSTGRES_DB: jeeves_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"

      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('api/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r api/requirements.txt

      - name: Check golden dataset age (< 30 days)
        run: |
          if [ -f api/tests/golden_dataset.jsonl ]; then
            AGE_DAYS=$(( ($(date +%s) - $(stat -c %Y api/tests/golden_dataset.jsonl) ) / 86400 ))
            echo "golden_dataset.jsonl age: $AGE_DAYS days"
            if [ "$AGE_DAYS" -gt 30 ]; then
              echo "::warning title=Stale dataset::golden_dataset.jsonl is $AGE_DAYS days old (> 30 days). Consider updating."
            fi
          else
            echo "::warning title=Missing dataset::golden_dataset.jsonl not found"
          fi

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check api/app/ api/tests/

      - name: Test with pytest
        env:
          DATABASE_URL: postgresql://jeeves:jeeves@localhost:5432/jeeves_test
          JWT_SECRET: ci-test-secret
          OPENAI_API_KEY: sk-test
          ENCRYPTION_KEY: ci-test-key-that-is-exactly-32-bytes!!
        run: |
          pip install pytest pytest-asyncio
          pytest api/tests/ -v --tb=short -W ignore::DeprecationWarning
